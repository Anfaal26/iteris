# CAMUS DRL — Class 1: LV_endo (left ventricular endocardium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c1.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# The ``agents:`` block contains per-algorithm hyperparams.
# All env/reward keys at the top level are shared across agents.

target_class:        1
class_name:          LV_endo
dataset:             CAMUS
baseline_cfg_name:   camus.yaml
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_best.pt

# ── Reward shaping — LV_endo rationale ───────────────────────────────────────
# Week-1 baseline: Dice 0.938, HD95 ~6 px.  Pure Dice-delta gives almost no
# gradient signal at this level (step gain ≈ 0.003–0.005).  The HD95 component
# adds boundary-precision signal that remains informative even at high Dice.
# hd_norm = 2× mean HD95 so a typical improvement (6→4 px) contributes ~0.17
# to the composite reward — meaningful without dominating.
reward_mode:   dice_hd_composite
reward_alpha:  0.6               # 60 % Dice — still the primary target metric
reward_beta:   0.4               # 40 % HD95 — boundary precision
hd_norm:       12.0              # normalise HD95; 12 ≈ 2× mean HD95 of ~6 px

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
# Tighter early-stop: at Dice 0.94 a 0.001 step gain is real signal, not noise.
stop_eps_dice:     0.0005
stop_eps_hd:       0.3
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# At Dice 0.93, most train samples are already near-perfect and no discrete
# action can improve them.  Weighting ∝ exp((1-init_dice)*scale) boosts hard
# samples (dice=0.85 → ~2×, dice=0.75 → ~5×) while keeping easy samples in
# the mix so the agent still learns "no-op on already-good states".
hard_mining_scale: 5.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
# resolve_agent_config() merges the chosen block over the top-level dict.
agents:

  DQN:
    agent_type:          DQN
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DDQN:
    agent_type:          DDQN
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000    # 10000→50000: retains 5× more experience so early
                                  # diverse exploration is not overwritten by late
                                  # oscillation transitions
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000    # 40000→25000: reach low-ε while buffer still has
                                  # diverse signal; avoids 30k steps of pure greedy
                                  # oscillation reinforcing the wrong policy
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DUELING:
    agent_type:          DUELING
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  MSA-DUELING:
    agent_type:          MSA-DUELING
    num_heads:           4
    key_dim:             64
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DDPG:
    agent_type:          DDPG
    # 3-component action: (morph, dy_norm, dx_norm)
    cont_morph_scale:    0.25        # ±5 px dilation/erosion  (at sdt_clip=20)
    cont_trans_scale:    0.02        # ±5 px translation        (at H=256)
    # Per-component OU noise — proportional to each scale
    ou_sigma:            [0.025, 0.002, 0.002]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Paradigm 1 — sequential boundary tracing (the agent draws the mask) ──────
  # Selector name ends in _TRACE; agent_type stays DDQN so the refinement DDQN
  # above and this tracing agent coexist.  env_class routes run_drl_training to
  # the vectorised tracing loop.  See docs/CONTEXT_PARADIGM1.md.
  # ── DQN_TRACE: basic Q-network boundary tracer (no target-network double trick) ──
  DQN_TRACE:
    agent_type:             DQN
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       400
    closure_tolerance:      3
    min_perimeter_steps:    50
    boundary_bonus_distance: 1.5
    reward_boundary_bonus:  0.5
    reward_closure:         5.0
    reward_offimage:       -10.0
    reward_length_penalty: -5.0
    max_distance_penalty:   10.0
    seed_method:            topmost
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    18000
    train_steps:            30000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  # ── DUELING_TRACE: dueling Q-network tracer (V + A heads, best for exploration) ──
  DUELING_TRACE:
    agent_type:             DUELING
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       400
    closure_tolerance:      3
    min_perimeter_steps:    50
    boundary_bonus_distance: 1.5
    reward_boundary_bonus:  0.5
    reward_closure:         5.0
    reward_offimage:       -10.0
    reward_length_penalty: -5.0
    max_distance_penalty:   10.0
    seed_method:            topmost
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    18000
    train_steps:            30000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  DDQN_TRACE:
    agent_type:             DDQN
    env_class:              contour_tracing
    # ── tracing env (LV_endo: closed contour, expected perimeter ~250 px) ──
    patch_size:             64
    max_trace_length:       400      # ~1.5× expected perimeter
    closure_tolerance:      3
    min_perimeter_steps:    50
    boundary_bonus_distance: 1.5
    reward_boundary_bonus:  0.5
    reward_closure:         5.0
    reward_offimage:       -10.0
    reward_length_penalty: -5.0
    max_distance_penalty:   10.0
    seed_method:            topmost
    # ── agent (smaller net: 64² patch input, 8 actions) ──
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    18000
    train_steps:            30000    # gradient updates; each iteration steps 16 envs
    # ── training-speed (options 1 + 3) ──
    num_envs:               16       # vectorised batch width
    grad_updates:           1        # gradient updates per batched env-step
    eval_every:             5000
    val_subset:             50       # in-training eval subset; full val at the end
    seed:                   42
    checkpoint_dir:         /kaggle/working
