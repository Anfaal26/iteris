# DRIVE — retinal vessel segmentation (binary: bg / vessel).
# Source: kaggle.com/datasets/andrewmvd/drive-digital-retinal-images-for-vessel-extraction
#
# IMPORTANT: only 20 labelled training images exist publicly. The DRIVE
# challenge keeps test-set vessel annotations hidden. We apply our own
# 15/3/2 patient-level split with heavy augmentation.

dataset: DRIVE
modality: fundus

data_root: /kaggle/input/datasets/andrewmvd/drive-digital-retinal-images-for-vessel-extraction
checkpoint_dir: /kaggle/working

# ── Preprocessing ──────────────────────────────────────────────────────────────
image_size: [256, 256]              # resized from native 584x565 — fine for vanilla baseline
spacing: [1.0, 1.0]
normalize: minmax                   # RGB fundus
apply_orientation: false
binarize_labels: true               # 1st_manual masks are 0/255

# ── Classes ────────────────────────────────────────────────────────────────────
in_channels: 3                      # RGB (full-channel for vanilla; green-only is a Week 4 ablation)
num_classes: 2                      # background + vessel
class_names:  [background, vessel]
class_colors: ['#000000', '#22D3EE']     # cyan, matches CONTEXT.md palette

# ── Splits (patient-level — DRIVE has only 20 labelled images) ─────────────────
val_split:  0.15                    # ≈3 patients
test_split: 0.10                    # ≈2 patients
label_frac: 1.0

# ── Training ───────────────────────────────────────────────────────────────────
# Only ~15 training samples → batch size kept at 8 to maintain BN stats.
# More patience because few-sample training plateaus + oscillates more.
batch_size: 8
epochs: 100                          # more headroom — early stop will trim
lr: 1.0e-4
weight_decay: 1.0e-5
patience: 20                         # higher — small data is noisier
save_every_n_epochs: 10
cache_rate: 1.0
cache_workers: 2
dataloader_workers: 0
seed: 42

# ── Augmentation ───────────────────────────────────────────────────────────────
# Heavy augmentation — necessary for 15 training samples.
# Vessels are rotation-invariant, so full ±180° rotation is safe.
aug_flip_prob:           0.5
aug_affine_prob:         0.8        # very aggressive
aug_rotate_range:        3.14       # ±180°
aug_scale_range:         0.20
aug_translate_range:     30
aug_intensity_shift:     0.20
aug_intensity_shift_prob: 0.5
aug_gauss_noise_prob:    0.4
aug_gauss_noise_std:     0.03
