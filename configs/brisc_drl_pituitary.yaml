# BRISC DRL — Pituitary Tumor (class filter: tumor_type == 'pituitary')
#
# Pituitary characteristics:
#   - Small: diameter ~15-25px at 256×256 → perimeter ~47-78px
#   - Compact, relatively well-defined
#   - Fixed anatomical location: sella turcica (bottom-center of brain)
#   - Very small area — 1 bad step can drop Dice significantly
#   - U-Net init generally reliable due to consistent location
#
# Load with:
#   cfg_full = load_drl_class_config('configs/brisc_drl_pituitary.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        1
class_name:          pituitary
tumor_type_filter:   pituitary
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

reward_mode:   iou_delta           # smoother than Dice for very small structures
reward_alpha:  1.0
reward_beta:   0.0
hd_norm:       10.0                # tighter — 5px is catastrophic at 15-25px scale

image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          10.0            # tighter SDT range for very small structures
reward_clip:       1.0
min_area_fraction: 0.002           # keep tiny pituitaries (~6×6px minimum)
stop_eps_dice:     0.002
stop_eps_hd:       0.5
stop_n:            2               # quick convergence detection for small structures

hard_mining_scale: 2.0             # moderate — pituitary hard cases mostly solvable

agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.10       # finer morph scale — tiny structure needs precision
    cont_trans_scale:    0.005      # very fine translation for small target
    ou_sigma:            [0.01, 0.0005, 0.0005]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Paradigm 1 — boundary tracing ────────────────────────────────────────────
  # Pituitary: small and compact. Short T_max — 100 steps is 1.3-2.1× perimeter.
  # Fixed anatomy → centroid seed is highly reliable (always near sella turcica).
  # Tight closure tolerance since the return path is short and predictable.
  DQN:
    agent_type:             DQN
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       120      # 1.5-2.5× expected max perimeter (~78px)
    closure_tolerance:      3        # tight — compact structure, short return path
    min_perimeter_steps:    15       # small minimum for small structures
    seed_method:            centroid
    coverage_tolerance:      1.5
    reward_step_cost:        -0.01
    reward_coverage_bonus:    0.30   # higher per-pixel bonus — each boundary pixel
                                     # is a larger fraction of total perimeter
    reward_off_boundary:     -0.05
    reward_off_boundary_cap:  3.0    # tighter cap — small structure, proportional scale
    reward_terminal_dice:    10.0
    reward_closure_min_dice:  0.25   # tighter gate — pituitary should close cleanly
    reward_closure_bonus:     2.0
    reward_offimage:        -10.0
    reward_smoothness_penalty: -0.02
    lr:                     1.0e-4
    gamma:                  0.99    # higher gamma — short episodes, need long-horizon view
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            30000   # smaller — short episodes fill buffer quickly
    prefill_steps:          1000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    20000
    train_steps:            40000   # fewer steps — compact structure converges faster
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  DuelingDDQN:
    agent_type:             DUELING
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       120
    closure_tolerance:      3
    min_perimeter_steps:    15
    seed_method:            centroid
    coverage_tolerance:      1.5
    reward_step_cost:        -0.01
    reward_coverage_bonus:    0.30
    reward_off_boundary:     -0.05
    reward_off_boundary_cap:  3.0
    reward_terminal_dice:    10.0
    reward_closure_min_dice:  0.25
    reward_closure_bonus:     2.0
    reward_offimage:        -10.0
    reward_smoothness_penalty: -0.02
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            30000
    prefill_steps:          1000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    20000
    train_steps:            40000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working
