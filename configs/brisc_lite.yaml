# BRISC 2025 — LITE baseline (lightweight plain U-Net) for the RL warm-start.
#
# Identical data/preprocessing to brisc.yaml; the ONLY differences are the
# architecture (`model: lite_unet`) and a distinct checkpoint name. Intentionally
# weaker so its errors are systematic and the RL contour agents have headroom.

dataset: BRISC
modality: brain_mri

data_root: /kaggle/input/brisc2025
checkpoint_dir: /kaggle/working

model: lite_unet                  # <-- the only architectural change vs brisc.yaml

image_size: [256, 256]
spacing: [1.0, 1.0]
normalize: zscore
apply_orientation: false
binarize_labels: true

in_channels: 1
num_classes: 2
class_names:  [background, tumor]
class_colors: ['#000000', '#F43F5E']

val_split:  0.15
test_split: 0.10
label_frac: 1.0

batch_size: 8
epochs: 40
lr: 1.0e-4
weight_decay: 1.0e-5
loss_label_smoothing: 0.1         # softens CE targets so softmax isn't pinned at 0/1 -- fixes the
                                   # INERT prob_map (Pillar4: BRISC_tumor band_frac=0.0007, the WORST
                                   # of all 4 classes, ~9x more inert than CAMUS LA) that was blocking
                                   # the DRL uncertainty gate and starving the contour env's 5th
                                   # state channel of signal. Re-run prob_map_informativeness after
                                   # retraining -- if band_frac is still <0.01, raise to 0.15-0.2.
patience: 10
save_every_n_epochs: 10
cache_rate: 1.0
cache_workers: 2
dataloader_workers: 0
seed: 42

aug_flip_prob:           0.5
aug_affine_prob:         0.6
aug_rotate_range:        0.26
aug_scale_range:         0.1
aug_translate_range:     10
aug_intensity_shift:     0.15
aug_intensity_shift_prob: 0.4
aug_gauss_noise_prob:    0.3
aug_gauss_noise_std:     0.02
