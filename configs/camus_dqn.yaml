# CAMUS DRL — Double DQN agent.
# Per-class binary: train one agent per structure (target_class ∈ {1, 2, 3}).
#   1 = LV_endo,  2 = LV_epi,  3 = LA

agent_type: DDQN              # vanilla DQN with Double-DQN target (best-practice default)
dataset: CAMUS

# Baseline + dataset roots — override in notebook if Kaggle paths differ.
baseline_cfg_name:    camus.yaml
baseline_checkpoint:  /kaggle/input/camus-baseline-outputs/camus_best.pt
camus_data_root:      /kaggle/input/datasets/anfaalhossain/camus/CAMUS

# ── Which structure are we training? ──────────────────────────────────────────
target_class: 1               # 1=LV_endo (run separate notebook for 2 and 3)

# ── Environment ───────────────────────────────────────────────────────────────
image_size: 256
max_steps: 20
shift_px: 2
sdt_clip: 20.0
reward_clip: 1.0
min_area_fraction: 0.01

# ── Networks ──────────────────────────────────────────────────────────────────
embed_dim: 256

# ── DQN hyperparams ───────────────────────────────────────────────────────────
lr: 1.0e-4
gamma: 0.99
tau: 0.005
batch_size: 64
buffer_size: 10000
prefill_steps: 2000

# ── ε-greedy schedule ─────────────────────────────────────────────────────────
epsilon_start: 1.0
epsilon_end:   0.05
epsilon_decay_steps: 40000

# ── Training budget ───────────────────────────────────────────────────────────
train_steps: 50000
eval_every: 2000
seed: 42
checkpoint_dir: /kaggle/working
