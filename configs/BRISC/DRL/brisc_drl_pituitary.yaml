# BRISC DRL — Pituitary Tumor (class filter: tumor_type == 'pituitary')
#
# Pituitary characteristics:
#   - Small: diameter ~15-25px at 256×256 → perimeter ~47-78px
#   - Compact, relatively well-defined
#   - Fixed anatomical location: sella turcica (bottom-center of brain)
#   - Very small area — 1 bad step can drop Dice significantly
#   - U-Net init generally reliable due to consistent location
#
# Load with:
#   cfg_full = load_drl_class_config('configs/brisc_drl_pituitary.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        1
class_name:          pituitary
tumor_type_filter:   pituitary
dataset:             BRISC
baseline_cfg_name:   BRISC/brisc_lite.yaml   # RL refines the LITE baseline (attn net = competitor)
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_lite_unet_best.pt

reward_mode:   iou_delta           # smoother than Dice for very small structures
reward_alpha:  1.0
reward_beta:   0.0
hd_norm:       10.0                # tighter — 5px is catastrophic at 15-25px scale
reward_potential_scale: 15.0       # PBRS Φ scale (dice_pbrs only); baseline-centred

image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          10.0            # tighter SDT range for very small structures
reward_clip:       1.0
min_area_fraction: 0.002           # keep tiny pituitaries (~6×6px minimum)
stop_eps_dice:     0.002
stop_eps_hd:       0.5
stop_n:            2               # quick convergence detection for small structures

hard_mining_scale: 2.0             # moderate — pituitary hard cases mostly solvable
# Tier 1.5 floor (see iteris/drl_training.py _hard_mining_weights): headroom
# NOT individually diagnosed, but this class already has the mildest scale
# of the 3 BRISC subtypes and the most qualitatively promising prior
# ("mostly solvable" above) -- light floor, similar treatment to CAMUS's
# confirmed-headroom classes rather than tumor/glioma's stronger ones.
hard_mining_uniform_mix: 0.75

# ── Ablation knobs (OFF by default — see docs/EXPERIMENTS.md + SKILLS.md) ──────
# directional_state: append 2 DeepSnake-style SDT-gradient 'direction' channels
#   to the agent state (5->7) — tells each location WHICH WAY the boundary is,
#   not just how far. Flip to true to run the ablation. WARNING: changes the
#   network input shape -> invalidates existing 5-channel DRL checkpoints (no
#   resume across the flip) and makes results incomparable to 5-channel runs;
#   treat as a separate arm and coordinate before enabling on a shared iteris-pkg.
directional_state:    false
# topology_filter: down-weight (or drop) TRAINING samples whose init mask has a
#   high (topology+interior) error fraction — structural error contour nudging
#   cannot fix. Training-time only; val/test are NEVER filtered. See drl_training.
topology_filter:      false
topology_max_frac:    0.5          # samples with topo+interior error > this are affected
topology_filter_mode: downweight   # 'downweight' (keep, scaled) or 'drop' (exclude)
topology_downweight:  0.1          # weight for over-threshold samples in downweight mode

agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.10       # finer morph scale — tiny structure needs precision
    cont_trans_scale:    0.005      # very fine translation for small target
    ou_sigma:            [0.01, 0.0005, 0.0005]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Local mask refinement (SegmentationEnv v4, 24 actions) ───────────────────
  # Pituitary: small and compact, fixed anatomical location — gamma=0.99 for a
  # longer-horizon view despite short episodes; fewer train steps since this
  # class converges fastest.
  # STOP-incentive shaping (see camus_drl_c1.yaml for full rationale): breaks
  # the baseline-indifference trap so "reach best mask, then STOP" is optimal.
  # Replaces the retired Paradigm-1 boundary-tracing config (env_class:
  # contour_tracing no longer exists — see archive/paradigm1_boundary_tracing/).
  # ── TD3 (robust DDPG) on contour env — CURATED FOR pituitary (smallest) ─────
  # Smallest structures (~15-25 px): fewest sectors (10), fewer points (16),
  # smallest displacement (1.0 px) so a single edit cannot overshoot the target.
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_pbrs
    reward_potential_scale: 15.0
    reward_step_penalty:  0.0
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # DISABLED 2026-06-30: BRISC tumour prob_map is INERT (Pillar4 2026-06-25 band_frac=0.0007 -- the most binary of all diagnosed classes, well under the
                                        # 0.01 USABLE threshold). With this little graded signal the gate clamps edit magnitude to ~0 at ~99% of
                                        # contour points -- net harmful (collapses actor/BC demos toward identity), not neutral. Same model/
                                        # checkpoint (brisc_lite_unet_best.pt) backs all 4 BRISC configs, so this applies uniformly across
                                        # tumor/glioma/meningioma/pituitary, both TD3 and DuelingDDQN.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    false
    fail_thresh:         0.02          # ADDED 2026-06-30 (was missing -- BRISC TD3 had no downside floor at all).
                                        # TD3 has no learned STOP and dice_converged commits whatever the contour
                                        # converged to, even below baseline. Terminate early if Dice sits >0.02 below
                                        # baseline for fail_n steps so a drifting actor can't lock in a sub-baseline
                                        # final mask. Same value as CAMUS c1/c2/c3 TD3 -- this is also the precondition
                                        # that makes curriculum_max_steps' longer hard-sample episodes safe below.
    fail_n:              1             # TIGHTENED 2026-06-30 from 2: BRISC's tumour-scale fail_thresh
                                        # detection is delayed (needs fail_n CONSECUTIVE breaches before
                                        # terminating), and a single bad edit on a ~1.7%-area target can
                                        # already blow well past the 0.02 threshold in one step (confirmed:
                                        # real run showed final Dice landing -0.06 to -0.07 below baseline
                                        # despite fail_thresh=0.02, fail_n=2 -- by the 2nd confirming step the
                                        # damage was already 3x the nominal floor). fail_n=1 terminates on the
                                        # FIRST breach instead of waiting for confirmation -- appropriate here
                                        # because tiny-target volatility makes a single breach meaningful
                                        # signal, not transient noise (unlike CAMUS's larger structures,
                                        # where fail_n=2 stays a deliberate noise filter -- left unchanged).
    n_points          : 24          # small structure (~15-25 px) — fewer points
    cont_sectors:        10
    disp_px           : 1.5           # smaller push so one bad edit can't overshoot
    spline_smooth     : 0.0     # NO smoothing
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.25
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps         : 8             # tighter — small targets degrade faster
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # Same mechanism as CAMUS TD3 -- TD3 auto-stops on GT-dice convergence, so
    # this mainly helps HARD samples (more room to travel before cutoff); the
    # fail_thresh net above bounds the downside so a longer cap can't lock in a
    # worse mask. Train-only; eval/test always use the fixed max_steps above.
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 13      # headroom not individually diagnosed for this subtype -- outcome unknown (see brisc_drl_tumor.yaml)
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    bc_warm_start:       true          # TD3+BC (Fujimoto & Gu 2021): pretrain the actor on oracle demonstrations (GT used at TRAIN time only, never at deployment) so it starts from competent behaviour instead of the near-zero identity its small-init final layer collapses to; the bc_lambda regulariser then keeps RL fine-tuning from drifting back to identity under the catastrophic-downside reward landscape.
    bc_demo_episodes:    150
    bc_demo_max_steps:   8
    bc_pretrain_epochs:  30
    bc_lambda_start:     0.5
    bc_lambda_end:       0.05
    bc_lambda_decay_steps: 20000
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.

  DQN:
    agent_type:          DQN
    reward_step_penalty: 0.002
    disable_auto_stop:   true
    terminal_bonus_scale: 3.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           128
    batch_size:          64
    buffer_size:         30000   # smaller — short episodes fill buffer quickly
    prefill_steps:       1000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 20000
    train_steps:         40000   # fewer steps — compact structure converges faster
    eval_every:          5000
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN_GLOBAL:
    agent_type:          DUELING
    reward_step_penalty: 0.002
    disable_auto_stop:   true
    terminal_bonus_scale: 3.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           128
    batch_size:          64
    buffer_size:         30000
    prefill_steps:       1000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 20000
    train_steps:         40000
    eval_every:          5000
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── DuelingDDQN (discrete contour refinement) — ACTIVE discrete agent ─────────
  # Dueling Double DQN on ContourRefineEnv (pituitary — smallest): 18 discrete actions =
  # push each of 8 angular boundary sectors OUT/IN + smooth + stop. Baseline-centred
  # PBRS reward. This is the discrete counterpart to TD3 (continuous contour).
  DuelingDDQN:
    agent_type:          DUELING
    max_steps         : 8             # tighter — small targets degrade faster
    env_class:           contour
    n_points          : 24          # small structure (~15-25 px) — fewer points
    disp_px           : 1.5           # smaller push so one bad edit can't overshoot
    spline_smooth     : 0.0     # NO smoothing
    smooth_lambda:       0.5
    reward_mode:          dice_pbrs
    reward_potential_scale: 15.0
    reward_step_penalty:  0.05         # optimal-stopping cost (2026-06-29, ported from CAMUS c1/c2/c3 + BRISC tumour). NOTE: headroom not individually diagnosed for this subtype (only the pooled 'tumor' class was tested -- realistic headroom -0.0501, NO HEADROOM -- see brisc_drl_tumor.yaml). Outcome here is unknown; this is the 'optional if time permits' tier per PLAN.md, not yet headroom-confirmed either way.
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # DISABLED 2026-06-30: BRISC tumour prob_map is INERT (Pillar4 2026-06-25 band_frac=0.0007 -- the most binary of all diagnosed classes, well under the
                                        # 0.01 USABLE threshold). With this little graded signal the gate clamps edit magnitude to ~0 at ~99% of
                                        # contour points -- net harmful (collapses actor/BC demos toward identity), not neutral. Same model/
                                        # checkpoint (brisc_lite_unet_best.pt) backs all 4 BRISC configs, so this applies uniformly across
                                        # tumor/glioma/meningioma/pituitary, both TD3 and DuelingDDQN.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    true
    terminal_bonus_scale: 0.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 18000         # reduced from 30000 — with the uncertainty gate bounding
                                       # downside risk, push more of the training budget into
                                       # exploitation so STOP/minimal-edit-when-already-good is
                                       # reliably learned
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # Same mechanism as CAMUS c1/c2/c3 + BRISC tumour DuelingDDQN -- GT-based
    # difficulty sets a per-sample episode length during training only;
    # eval/test always use the fixed max_steps above. hard_mining_scale is
    # this class's own top-level value (not overridden here) -- unchanged.
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 13
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.
