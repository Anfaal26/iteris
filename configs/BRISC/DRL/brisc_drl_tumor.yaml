# BRISC DRL — Brain Tumour MRI (class 1: tumor)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/brisc_drl_tumor.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# ── Algorithms ───────────────────────────────────────────────────────────────
#
# DQN / DuelingDDQN — 24-action local mask refinement (SegmentationEnv v4):
#   4 cardinal dilations + 4 cardinal erosions
#   4 diagonal dilations + 4 diagonal erosions (NEW — precise corner correction)
#   4 shifts + smooth + add_uncertain + remove_uncertain (NEW) + stop
#   Reward: iou_delta (smoother for small tumours).
#
# DDPG — 3-D continuous action (morph, dy, dx) on the same SegmentationEnv.
#   Kept as the paper's continuous comparison baseline.

target_class:        1
class_name:          tumor
dataset:             BRISC
baseline_cfg_name:   BRISC/brisc.yaml        # RL refines this U-Net directly (single-baseline design -- no separate lite/competitor split)
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Reward shaping — tumor rationale ─────────────────────────────────────────
# Week-1 baseline: Dice 0.835, HD95 ~8.4 px.  Tumours occupy ~1.7% of image
# area on average — Dice fluctuates wildly on small structures (adding/losing
# a handful of pixels swings Dice by ~0.01).  IoU-delta is smoother for small
# targets because IoU = Dice/(2−Dice) compresses the scale, reducing variance
# in the reward signal.  hd_norm kept for potential composite ablation.
reward_mode:   iou_delta          # smoother than dice_delta for small targets
reward_alpha:  1.0                # not used for iou_delta; kept for composite ablation
reward_beta:   0.0                # not used for iou_delta
hd_norm:       17.0               # 2× mean HD95 (~8.36 px) — for ablation only
reward_potential_scale: 15.0      # PBRS Φ scale (dice_pbrs only); small targets → tinier
                                  # Dice deltas → larger K to clear the Q-net noise floor.

# ── Environment (shared by all agents — SegmentationEnv v4) ─────────────────
image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          15.0           # tighter than CAMUS (20) — small structures
reward_clip:       1.0
min_area_fraction: 0.005          # keep small tumours; ~12×12 px in 256×256
stop_eps_dice:     0.005    # 0.001→0.005: at BRISC init Dice ~0.876, a 1-px op
                            # changes Dice by 0.001–0.003, causing false-convergence
                            # after 3 steps. 0.005 ensures the agent genuinely stops
                            # only when nothing meaningful is changing.
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ───────────────────────────────────────────────────────
# Applies to ALL agents (not DDPG-only). At init Dice ~0.876, 80%+ of samples
# are already near-perfect — morphological ops can't improve them. Hard mining
# focuses training on the improvable minority.
# scale=8.0: Dice=0.80 gets ~7× weight vs Dice=0.93 (~1.7×). Aggressive but
# necessary — without it the agent sees mostly zero-improvement gradient.
hard_mining_scale: 8.0
# Tier 1.5 floor (see iteris/drl_training.py _hard_mining_weights): unlike
# CAMUS, BRISC tumor (pooled) has CONFIRMED NEGATIVE realistic headroom
# (docs/CONTEXT.md / SKILLS.md, Pillar4 2026-06-25: -0.0501 -- the lite
# baseline already exceeds the attention competitor, i.e. there is no
# established achievable ceiling for the contour agent to reach on this
# class at all). At scale=8.0 the unfloored formula puts ~5.5x the
# per-sample training density on the hard tail relative to its population
# share -- concentrating budget on a class-wide regime already known to
# lack headroom is the worse failure mode here, not the reverse. Floor
# strongly toward uniform: success on this class is near-zero regression,
# not improvement (see reward_step_penalty note in the DuelingDDQN block
# below), so training density should not be aggressively skewed toward a
# likely-unfixable tail.
hard_mining_uniform_mix: 0.35

# ── Per-agent hyperparams ────────────────────────────────────────────────────
# ── Ablation knobs (OFF by default — see docs/EXPERIMENTS.md + SKILLS.md) ──────
# directional_state: append 2 DeepSnake-style SDT-gradient 'direction' channels
#   to the agent state (5->7) — tells each location WHICH WAY the boundary is,
#   not just how far. Flip to true to run the ablation. WARNING: changes the
#   network input shape -> invalidates existing 5-channel DRL checkpoints (no
#   resume across the flip) and makes results incomparable to 5-channel runs;
#   treat as a separate arm and coordinate before enabling on a shared iteris-pkg.
directional_state:    false
# topology_filter: down-weight (or drop) TRAINING samples whose init mask has a
#   high (topology+interior) error fraction — structural error contour nudging
#   cannot fix. Training-time only; val/test are NEVER filtered. See drl_training.
topology_filter:      false
topology_max_frac:    0.5          # samples with topo+interior error > this are affected
topology_filter_mode: downweight   # 'downweight' (keep, scaled) or 'drop' (exclude)
topology_downweight:  0.1          # weight for over-threshold samples in downweight mode

agents:

  DDPG:
    agent_type:          DDPG
    # env_class implicitly 'default' (continuous always uses base env)
    cont_morph_scale:    0.15        # ±2.25 px dilation/erosion  (at sdt_clip=15)
    cont_trans_scale:    0.01        # ±2.56 px translation        (at H=256)
    ou_sigma:            [0.015, 0.001, 0.001]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── TD3 (robust DDPG) on contour env — CURATED FOR BRISC tumors ─────────────
  # Small, irregular targets (~12-25 px): fewer angular sectors (12) avoid
  # over-parameterising a tiny boundary; smaller per-step displacement (1.5 px)
  # and lighter spline smoothing (1.0) preserve irregular tumor shape. dice_pbrs
  # (IoU-like, baseline-centred, K=15) gives a clean, well-scaled signal where
  # raw Dice deltas are tiny. TD3 twin-critics curb the overestimation that
  # wrecks DDPG on small-target reward noise.
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_pbrs
    reward_potential_scale: 15.0
    reward_step_penalty:  0.0
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # DISABLED 2026-06-30: BRISC tumour prob_map is INERT (Pillar4 2026-06-25 band_frac=0.0007 -- the most binary of all diagnosed classes, well under the
                                        # 0.01 USABLE threshold). With this little graded signal the gate clamps edit magnitude to ~0 at ~99% of
                                        # contour points -- net harmful (collapses actor/BC demos toward identity), not neutral. Same model/
                                        # checkpoint (brisc_lite_unet_best.pt) backs all 4 BRISC configs, so this applies uniformly across
                                        # tumor/glioma/meningioma/pituitary, both TD3 and DuelingDDQN.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    false
    fail_thresh:         0.02          # ADDED 2026-06-30 (was missing -- BRISC TD3 had no downside floor at all).
                                        # TD3 has no learned STOP and dice_converged commits whatever the contour
                                        # converged to, even below baseline. Terminate early if Dice sits >0.02 below
                                        # baseline for fail_n steps so a drifting actor can't lock in a sub-baseline
                                        # final mask. Same value as CAMUS c1/c2/c3 TD3 -- this is also the precondition
                                        # that makes curriculum_max_steps' longer hard-sample episodes safe below.
    fail_n:              1             # TIGHTENED 2026-06-30 from 2: BRISC's tumour-scale fail_thresh
                                        # detection is delayed (needs fail_n CONSECUTIVE breaches before
                                        # terminating), and a single bad edit on a ~1.7%-area target can
                                        # already blow well past the 0.02 threshold in one step (confirmed:
                                        # real run showed final Dice landing -0.06 to -0.07 below baseline
                                        # despite fail_thresh=0.02, fail_n=2 -- by the 2nd confirming step the
                                        # damage was already 3x the nominal floor). fail_n=1 terminates on the
                                        # FIRST breach instead of waiting for confirmation -- appropriate here
                                        # because tiny-target volatility makes a single breach meaningful
                                        # signal, not transient noise (unlike CAMUS's larger structures,
                                        # where fail_n=2 stays a deliberate noise filter -- left unchanged).
    n_points          : 32          # match headroom diagnostic; preserve tumour shape
    cont_sectors:        12
    disp_px           : 2.0           # bigger push so per-step Dice change clears Q-noise
    spline_smooth     : 0.0     # NO smoothing — irregular boundaries need every detail
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.25
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps         : 10            # cap excursion past peak
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # Same mechanism as CAMUS TD3 -- TD3 auto-stops on GT-dice convergence, so
    # this mainly helps HARD samples (more room to travel before cutoff); the
    # fail_thresh net above bounds the downside so a longer cap can't lock in a
    # worse mask. Train-only; eval/test always use the fixed max_steps above.
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 15      # tumour: NO confirmed headroom (Pillar4 -0.0501) -- success = near-zero regression, not improvement
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    bc_warm_start:       true          # TD3+BC (Fujimoto & Gu 2021): pretrain the actor on oracle demonstrations (GT used at TRAIN time only, never at deployment) so it starts from competent behaviour instead of the near-zero identity its small-init final layer collapses to; the bc_lambda regulariser then keeps RL fine-tuning from drifting back to identity under the catastrophic-downside reward landscape.
    bc_demo_episodes:    150
    bc_demo_max_steps:   8
    bc_pretrain_epochs:  30
    bc_lambda_start:     0.5
    bc_lambda_end:       0.05
    bc_lambda_decay_steps: 20000
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.

  DQN:
    agent_type:          DQN
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for full rationale) ──
    # r_t = γ·Dice_{t+1} − Dice_t telescopes to γ^T·Dice_T − Dice_0, i.e. the
    # discounted FINAL-mask gain over baseline — directly closing the best-seen ≫
    # final gap in the BRISC log (init 0.876 → final 0.73-0.77 | best-seen 0.88)
    # without the path-dependence of the old Dice_t−Dice_0 + terminal_bonus scheme.
    reward_mode:          dice_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination

    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000           # larger: 24 actions need more diverse experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000           # slower decay: more exploration over 24-action space
    train_steps:         50000           # 30k→50k: training curve was still rising
    eval_every:          2000
    hard_mining_scale:   4.0             # 8→4: keep easy masks represented (train/eval match)
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN_GLOBAL:
    agent_type:          DUELING
    # ── Reward: potential-based shaping (see DQN block / camus_drl_c1.yaml) ──
    reward_mode:          dice_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination

    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    hard_mining_scale:   4.0             # 8→4: keep easy masks represented (train/eval match)
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Control-point CONTOUR refinement (Paradigm 3) ────────────────────────────
  # Local boundary deformation (control points + periodic spline) — see
  # camus_drl_c1.yaml::DuelingDDQN for the full rationale. Selected by
  # `env_class: contour`. Tumours are smaller and can be irregular (glioma), so
  # fewer points, tighter displacement, and lighter spline smoothing than CAMUS.
  #   cfg = resolve_agent_config(load_drl_class_config('configs/brisc_drl_tumor.yaml'),
  #                              'DuelingDDQN')
  DuelingDDQN:
    agent_type:          DUELING
    max_steps         : 10            # cap excursion past peak
    env_class:           contour
    # ── contour geometry ──
    n_points          : 32          # match headroom diagnostic; preserve tumour shape
    disp_px           : 2.0           # bigger push so per-step Dice change clears Q-noise
    spline_smooth     : 0.0     # NO smoothing — irregular boundaries need every detail
    smooth_lambda:       0.5
    # ── reward shaping ──
    reward_mode:          dice_pbrs
    reward_step_penalty:  0.05         # optimal-stopping cost (2026-06-29, ported from CAMUS c1/c2/c3): STOP is the
                                        # only penalty-free action (_terminal_step adds no penalty), so once a move's
                                        # marginal Dice gain falls below the penalty's effective threshold, Q(STOP)=0
                                        # beats Q(move)<0. NOTE: unlike CAMUS, BRISC tumour has NO confirmed headroom
                                        # (Pillar4 2026-06-25 diagnostic: realistic headroom -0.0501 -- the contour
                                        # ceiling is BELOW baseline for this class). This fix can only be expected to
                                        # help the agent converge to near-zero regression (STOP near the start instead
                                        # of drifting through 10 steps of no-gain edits) -- not to close any gap, since
                                        # there is no gap to close. Treat a near-parity result as success here.
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # DISABLED 2026-06-30: BRISC tumour prob_map is INERT (Pillar4 2026-06-25 band_frac=0.0007 -- the most binary of all diagnosed classes, well under the
                                        # 0.01 USABLE threshold). With this little graded signal the gate clamps edit magnitude to ~0 at ~99% of
                                        # contour points -- net harmful (collapses actor/BC demos toward identity), not neutral. Same model/
                                        # checkpoint (brisc_lite_unet_best.pt) backs all 4 BRISC configs, so this applies uniformly across
                                        # tumor/glioma/meningioma/pituitary, both TD3 and DuelingDDQN.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    true
    terminal_bonus_scale: 0.0     # ignored under pbrs
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 18000         # reduced from 30000 — with the uncertainty gate bounding
                                       # downside risk, push more of the training budget into
                                       # exploitation so STOP/minimal-edit-when-already-good is
                                       # reliably learned
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # Same mechanism as CAMUS c1/c2/c3 DuelingDDQN -- GT-based difficulty sets
    # a per-sample episode length during training only; eval/test always use
    # the fixed max_steps above (10). hard_mining_scale below is BRISC's own
    # pre-existing value (4.0, not CAMUS's 3.0) -- unchanged.
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 15
    hard_mining_scale:   4.0
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.
