# CAMUS DRL — MSA-DDPG agent.
# DDPG with a Multi-Head Self-Attention backbone in the actor only.
# The critic retains the standard CNN backbone (per CONTEXT.md: "MSA in actor").
# All env / buffer / OU noise / actor-freeze mechanics are identical to
# camus_ddpg.yaml.
# Expected wall time: ~6.5 hr on T4 (×1.3 of DDPG per compute budget).

agent_type: MSA-DDPG
dataset: CAMUS

baseline_cfg_name:    camus.yaml
baseline_checkpoint:  /kaggle/input/camus-baseline-outputs/camus_best.pt
camus_data_root:      /kaggle/input/datasets/anfaalhossain/camus/CAMUS

target_class: 1               # 1=LV_endo, 2=LV_epi, 3=LA

# ── Environment (locked — same as all CAMUS DRL configs) ──────────────────────
image_size: 256
max_steps: 20
sdt_clip: 20.0
reward_clip: 1.0
min_area_fraction: 0.01
cont_morph_scale: 0.25         # ±5 px dilation/erosion via SDT threshold (at sdt_clip=20)
cont_trans_scale: 0.02         # ±5 px translation (at H=256)

# ── MSA backbone (actor only) ─────────────────────────────────────────────────
num_heads: 4                  # attention heads
key_dim:   64                 # per-head key/query/value dimension
                              # → attn_dim = 4 × 64 = 256

# ── Network ───────────────────────────────────────────────────────────────────
embed_dim: 256

# ── DDPG hyperparams (unchanged from camus_ddpg.yaml) ────────────────────────
actor_lr:  1.0e-4
critic_lr: 1.0e-3
gamma: 0.99
tau:   0.005
batch_size: 64
buffer_size: 10000
prefill_steps: 2000

ou_theta: 0.15
ou_sigma: [0.025, 0.002, 0.002]   # per-component: [morph, dy, dx]

actor_freeze_steps: 2000

train_steps: 100000
eval_every:  2500
seed: 42
checkpoint_dir: /kaggle/working
