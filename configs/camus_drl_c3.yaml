# CAMUS DRL — Class 3: LA (left atrium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c3.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        3
class_name:          LA
dataset:             CAMUS
baseline_cfg_name:   camus.yaml
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_best.pt

# ── Reward shaping — LA rationale ─────────────────────────────────────────────
# Week-1 baseline: Dice 0.896, HD95 ~10 px.  The left atrium has high shape
# variability across patients and views — some are nearly circular, others
# highly elongated.  HD95 is less reliable here because a single outlier
# boundary pixel can spike HD95 regardless of overall segmentation quality.
# Pure Dice-delta is safer: it rewards overlap improvement consistently.
# hd_norm kept in config for potential ablations using dice_hd_composite.
reward_mode:   dice_delta        # shape variability makes HD95 an unreliable signal
reward_alpha:  0.7               # ignored for dice_delta; kept for composite ablation
reward_beta:   0.3               # ignored for dice_delta; kept for composite ablation
hd_norm:       22.0              # 2× expected HD95 of ~10 px (for ablation if needed)

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.001
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# LA baseline Dice 0.896 — meaningful spread of init dices; hard mining
# focuses training on shape-variable cases (elongated atria, poor views).
hard_mining_scale: 5.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
agents:

  DQN:
    agent_type:          DQN
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
  DuelingDDQN:
    agent_type:          DUELING
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000    # 10000→50000: retains 5× more experience so early
                                  # diverse exploration is not overwritten by late
                                  # oscillation transitions
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000    # 40000→25000: reach low-ε while buffer still has
                                  # diverse signal; avoids long greedy oscillation
                                  # reinforcing the wrong policy
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25
    cont_trans_scale:    0.02
    ou_sigma:            [0.025, 0.002, 0.002]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000    # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Paradigm 1 — sequential boundary tracing (the agent draws the mask) ──────
  # See camus_drl_c1.yaml DDQN_TRACE for the rationale; LA expected perimeter
  # ~280 px, high shape variability across patients.

  DQN_TRACE:
    agent_type:             DQN
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       420
    closure_tolerance:      3
    min_perimeter_steps:    55
    boundary_bonus_distance: 1.5
    reward_boundary_bonus:  0.5
    reward_closure:         5.0
    reward_offimage:       -10.0
    reward_length_penalty: -5.0
    max_distance_penalty:   10.0
    seed_method:            topmost
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    18000
    train_steps:            30000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  DuelingDDQN_TRACE:
    agent_type:             DUELING
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       420
    closure_tolerance:      3
    min_perimeter_steps:    55
    boundary_bonus_distance: 1.5
    reward_boundary_bonus:  0.5
    reward_closure:         5.0
    reward_offimage:       -10.0
    reward_length_penalty: -5.0
    max_distance_penalty:   10.0
    seed_method:            topmost
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    18000
    train_steps:            30000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working