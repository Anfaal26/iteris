# CAMUS DRL — Class 3: LA (left atrium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c3.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        3
class_name:          LA
dataset:             CAMUS
baseline_cfg_name:   camus_lite.yaml   # RL refines the LITE baseline (attn net = competitor)
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_lite_unet_best.pt

# ── Reward shaping — LA rationale ─────────────────────────────────────────────
# Week-1 baseline: Dice 0.896, HD95 ~10 px.  The left atrium has high shape
# variability across patients and views — some are nearly circular, others
# highly elongated.  HD95 is less reliable here because a single outlier
# boundary pixel can spike HD95 regardless of overall segmentation quality.
# Pure Dice-delta is safer: it rewards overlap improvement consistently.
# hd_norm kept in config for potential ablations using dice_hd_composite.
reward_mode:   dice_hd_composite  # LA: add HD95 signal to prevent mask ballooning.
                                  # Pure dice_delta was failing (curve degraded to 0.848).
                                  # The alpha/beta balance keeps Dice dominant but the
                                  # HD95 term prevents boundary blow-outs.
reward_alpha:  0.7               # 70% Dice — primary overlap objective
reward_beta:   0.3               # 30% HD95 — boundary precision guard
hd_norm:       22.0              # 2× expected HD95 of ~10 px
reward_potential_scale: 10.0     # PBRS Φ scale (dice_pbrs/dice_hd_pbrs only); baseline-centred

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         30         # LA corrections are more complex than LV; more headroom
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.005      # 0.001→0.005: episodes were terminating in ~3 steps
                              # before the agent could explore meaningful changes.
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# Run showed only 7.3% of samples have init Dice < 0.90.
# scale=10 made Dice=0.80 ~100× the weight of Dice=0.95 — so aggressive the
# agent never saw the easy majority, never learned STOP-when-good, and degraded
# good masks at eval. scale=3 focuses the improvable minority while keeping the
# easy majority represented (see camus_drl_c1.yaml).
hard_mining_scale: 3.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25
    cont_trans_scale:    0.02
    ou_sigma:            [0.025, 0.002, 0.002]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── TD3 (robust DDPG) on contour env — CURATED FOR LA (left atrium) ─────────
  # LA tends to balloon, so a slightly stronger spline smoothing keeps the
  # deformed contour anatomically plausible. 16 sectors of independent boundary
  # control surpass the global-op DDPG ceiling; TD3 stabilises the value est.
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_hd_pbrs
    reward_potential_scale: 10.0
    reward_step_penalty:  0.0
    disable_auto_stop:    false
    n_points:            32
    cont_sectors:        16
    disp_px:             2.0
    spline_smooth:       2.5
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.2
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps:           10
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DQN:
    agent_type:          DQN
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN:
    agent_type:          DUELING
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
