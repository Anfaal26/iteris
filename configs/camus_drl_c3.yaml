# CAMUS DRL — Class 3: LA (left atrium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c3.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        3
class_name:          LA
dataset:             CAMUS
baseline_cfg_name:   camus_lite.yaml   # RL refines the LITE baseline (attn net = competitor)
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_lite_unet_best.pt

# ── Reward shaping — LA rationale ─────────────────────────────────────────────
# Week-1 baseline: Dice 0.896, HD95 ~10 px.  The left atrium has high shape
# variability across patients and views — some are nearly circular, others
# highly elongated.  HD95 is less reliable here because a single outlier
# boundary pixel can spike HD95 regardless of overall segmentation quality.
# Pure Dice-delta is safer: it rewards overlap improvement consistently.
# hd_norm kept in config for potential ablations using dice_hd_composite.
reward_mode:   dice_hd_composite  # LA: add HD95 signal to prevent mask ballooning.
                                  # Pure dice_delta was failing (curve degraded to 0.848).
                                  # The alpha/beta balance keeps Dice dominant but the
                                  # HD95 term prevents boundary blow-outs.
reward_alpha:  0.7               # 70% Dice — primary overlap objective
reward_beta:   0.3               # 30% HD95 — boundary precision guard
hd_norm:       22.0              # 2× expected HD95 of ~10 px
reward_potential_scale: 10.0     # PBRS Φ scale (dice_pbrs/dice_hd_pbrs only); baseline-centred

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         30         # LA corrections are more complex than LV; more headroom
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.005      # 0.001→0.005: episodes were terminating in ~3 steps
                              # before the agent could explore meaningful changes.
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# Run showed only 7.3% of samples have init Dice < 0.90.
# scale=10 made Dice=0.80 ~100× the weight of Dice=0.95 — so aggressive the
# agent never saw the easy majority, never learned STOP-when-good, and degraded
# good masks at eval. scale=3 focuses the improvable minority while keeping the
# easy majority represented (see camus_drl_c1.yaml).
hard_mining_scale: 3.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25
    cont_trans_scale:    0.02
    ou_sigma:            [0.025, 0.002, 0.002]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── TD3 (robust DDPG) on contour env — CURATED FOR LA (left atrium) ─────────
  # LA tends to balloon, so a slightly stronger spline smoothing keeps the
  # deformed contour anatomically plausible. 16 sectors of independent boundary
  # control surpass the global-op DDPG ceiling; TD3 stabilises the value est.
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_hd_pbrs
    reward_potential_scale: 10.0
    reward_step_penalty:  0.0
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # OFF for LA (TD3) — same INERT prob_map as the DuelingDDQN block (Pillar4 2026-06-25: band_frac=0.0063, the most binary of the 3 CAMUS classes). On TD3 this also poisons the BC warm-start: `_apply_continuous` multiplies the actor's displacement by the gate (env_contour_refine.py:498) and bc_demo.py inherits the same env_kwargs+prob_map, so both the oracle demos and the actor collapse to identity. Re-enable (with the DuelingDDQN block) only after the label-smoothing lite retrain is confirmed USABLE.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    false
    fail_thresh:         0.02          # interim Pillar-2 safety net: TD3 has no learned STOP and _check_termination's dice_converged branch commits whatever the contour converged to, even below baseline. Terminate early if Dice sits >0.02 below baseline for fail_n steps so a drifting actor can't lock in a sub-baseline final mask (the deploy number).
    fail_n:              2
    n_points:            32
    cont_sectors:        16
    disp_px:             2.0
    spline_smooth:       2.5
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.2
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps:           10
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    bc_warm_start:       true          # TD3+BC (Fujimoto & Gu 2021): pretrain the actor on oracle demonstrations (GT used at TRAIN time only, never at deployment) so it starts from competent behaviour instead of the near-zero identity its small-init final layer collapses to; the bc_lambda regulariser then keeps RL fine-tuning from drifting back to identity under the catastrophic-downside reward landscape.
    bc_demo_episodes:    150
    bc_demo_max_steps:   8
    bc_pretrain_epochs:  30
    bc_lambda_start:     0.5
    bc_lambda_end:       0.05
    bc_lambda_decay_steps: 20000
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.

  DQN:
    agent_type:          DQN
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN_GLOBAL:
    agent_type:          DUELING
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── DuelingDDQN (discrete contour refinement) — ACTIVE discrete agent ─────────
  # Dueling Double DQN on ContourRefineEnv (LA — large; stronger smoothing curbs ballooning): 18 discrete actions =
  # push each of 8 angular boundary sectors OUT/IN + smooth + stop. Baseline-centred
  # PBRS reward. This is the discrete counterpart to TD3 (continuous contour).
  DuelingDDQN:
    agent_type:          DUELING
    max_steps         : 10            # cap excursion past peak (agent doesn't always STOP)
    env_class:           contour
    n_points:            32
    disp_px           : 2.0          # match TD3 + headroom diagnostic
    spline_smooth:       2.5
    smooth_lambda:       0.5
    reward_mode:          dice_hd_pbrs
    reward_potential_scale: 10.0
    reward_step_penalty:  0.0
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # OFF for LA — lite U-Net's prob_map is INERT here (Pillar4, 2026-06-25: band_frac=0.0063, the most binary of the 3 CAMUS classes), so the gate clamps edit magnitude to ~0 at ~99% of contour points, blocking the confirmed +0.049 realistic headroom. Re-enable only after the lite net is retrained with label smoothing to produce a graded prob_map.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    true
    terminal_bonus_scale: 0.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 18000         # reduced from 30000 — with the uncertainty gate bounding
                                       # downside risk, push more of the training budget into
                                       # exploitation so STOP/minimal-edit-when-already-good is
                                       # reliably learned
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.
