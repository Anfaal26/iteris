# CAMUS DRL — Class 2: LV_epi (left ventricular epicardium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c2.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        2
class_name:          LV_epi
dataset:             CAMUS
baseline_cfg_name:   camus.yaml
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_best.pt

# ── Reward shaping — LV_epi rationale ────────────────────────────────────────
# Week-1 baseline: Dice 0.872, HD95 ~8 px.  LV_epi wraps LV_endo and tapers
# to a thin apex — the single hardest boundary in CAMUS.  Pure Dice-delta
# treats all boundary pixels equally; the HD95 component specifically penalises
# large deviations that occur at the apex, which account for most HD95 error.
# Balanced alpha/beta (0.5/0.5): both overlap and precision matter equally here.
# hd_norm = 2× expected HD95 of ~8 px.
reward_mode:   dice_hd_composite
reward_alpha:  0.5               # 50 % Dice
reward_beta:   0.5               # 50 % HD95 — apex boundary is high-priority
hd_norm:       16.0              # normalise HD95; 16 ≈ 2× expected HD95 of ~8 px
reward_potential_scale: 10.0     # PBRS Φ scale (dice_pbrs/dice_hd_pbrs only); baseline-centred

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.005      # 1-px op on LVepi ≈ 0.003–0.007 Dice; 0.001 = false convergence
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# LVepi has more shape variability than LVendo. scale=10 starved the agent of
# easy masks → degraded them at eval; scale=3 keeps the easy majority in the mix
# (see camus_drl_c1.yaml for the full train/eval-mismatch rationale).
hard_mining_scale: 3.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25
    cont_trans_scale:    0.02
    ou_sigma:            [0.025, 0.002, 0.002]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    train_steps:         120000   # DDPG needs more steps; LV_epi is the hardest class
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DQN:
    agent_type:          DQN
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 30000
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN:
    agent_type:          DUELING
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 30000
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
