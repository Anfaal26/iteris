# CAMUS DRL — Class 2: LV_epi (left ventricular epicardium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c2.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        2
class_name:          LV_epi
dataset:             CAMUS
baseline_cfg_name:   camus.yaml
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_best.pt

# ── Reward shaping — LV_epi rationale ────────────────────────────────────────
# Week-1 baseline: Dice 0.872, HD95 ~8 px.  LV_epi wraps LV_endo and tapers
# to a thin apex — the single hardest boundary in CAMUS.  Pure Dice-delta
# treats all boundary pixels equally; the HD95 component specifically penalises
# large deviations that occur at the apex, which account for most HD95 error.
# Balanced alpha/beta (0.5/0.5): both overlap and precision matter equally here.
# hd_norm = 2× expected HD95 of ~8 px.
reward_mode:   dice_hd_composite
reward_alpha:  0.5               # 50 % Dice
reward_beta:   0.5               # 50 % HD95 — apex boundary is high-priority
hd_norm:       16.0              # normalise HD95; 16 ≈ 2× expected HD95 of ~8 px

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.001
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# LV_epi baseline Dice 0.872 — still benefits from preferring harder samples
# where boundary correction is achievable (apex regions, thin walls).
hard_mining_scale: 5.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
agents:
  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25
    cont_trans_scale:    0.02
    ou_sigma:            [0.025, 0.002, 0.002]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000    # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    train_steps:         120000   # DDPG needs more steps; LV_epi is the hardest class
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Paradigm 1 — sequential boundary tracing (the agent draws the mask) ──────
  # See camus_drl_c1.yaml DDQN_TRACE for the rationale; LV_epi has the longest
  # CAMUS perimeter (~320 px) and a thin apex, so max_trace_length is larger.

  DQN:
    agent_type:             DQN
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       480
    closure_tolerance:      3
    min_perimeter_steps:    60

    reward_smoothness_penalty: -0.02       # penalty per step when |delta_theta| > 45 deg
    # ── Region-aware reward (Paradigm-1 redesign) ──
    # Per-step (small, dense):
    coverage_tolerance:      1.5        # px window in which a step "covers" a GT boundary pixel
    reward_step_cost:        -0.01      # mild time pressure
    reward_coverage_bonus:    0.20      # +0.20 per NEW GT-boundary pixel reached
    reward_off_boundary:     -0.05      # soft gradient toward the boundary (per px, capped)
    reward_off_boundary_cap:  5.0
    # Terminal (DOMINANT — direct objective alignment):
    reward_terminal_dice:    10.0       # +10·Dice(rasterised_mask, gt) at episode end
    reward_closure_min_dice:  0.20      # closures with Dice < this earn ZERO closure bonus
    reward_closure_bonus:     2.0       # +2·Dice on closure (only if min-Dice gate passed)
    reward_offimage:        -10.0       # single hard negative on walk-off
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    36000
    train_steps:            60000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  DuelingDDQN:
    agent_type:             DUELING
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       480
    closure_tolerance:      3
    min_perimeter_steps:    60

    reward_smoothness_penalty: -0.02       # penalty per step when |delta_theta| > 45 deg
    # ── Region-aware reward (Paradigm-1 redesign) ──
    # Per-step (small, dense):
    coverage_tolerance:      1.5        # px window in which a step "covers" a GT boundary pixel
    reward_step_cost:        -0.01      # mild time pressure
    reward_coverage_bonus:    0.20      # +0.20 per NEW GT-boundary pixel reached
    reward_off_boundary:     -0.05      # soft gradient toward the boundary (per px, capped)
    reward_off_boundary_cap:  5.0
    # Terminal (DOMINANT — direct objective alignment):
    reward_terminal_dice:    10.0       # +10·Dice(rasterised_mask, gt) at episode end
    reward_closure_min_dice:  0.20      # closures with Dice < this earn ZERO closure bonus
    reward_closure_bonus:     2.0       # +2·Dice on closure (only if min-Dice gate passed)
    reward_offimage:        -10.0       # single hard negative on walk-off
    lr:                     1.0e-4
    gamma:                  0.99
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            50000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    36000
    train_steps:            60000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working
