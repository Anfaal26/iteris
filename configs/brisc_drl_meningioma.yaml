# BRISC DRL — Meningioma (class filter: tumor_type == 'meningioma')
#
# Meningioma characteristics:
#   - Well-defined, often spherical or lobulated
#   - Strong contrast enhancement — clear boundary in T1+Gd MRI
#   - Medium size: diameter ~40-80px at 256×256 → perimeter ~125-250px
#   - Roughly convex — easiest case for boundary tracing
#   - Located at brain periphery (adjacent to dura)
#
# Load with:
#   cfg_full = load_drl_class_config('configs/brisc_drl_meningioma.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        1
class_name:          meningioma
tumor_type_filter:   meningioma
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

reward_mode:   iou_delta
reward_alpha:  1.0
reward_beta:   0.0
hd_norm:       20.0

image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          15.0
reward_clip:       1.0
min_area_fraction: 0.005
stop_eps_dice:     0.001
stop_eps_hd:       0.5
stop_n:            3

hard_mining_scale: 3.0

agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.15
    cont_trans_scale:    0.01
    ou_sigma:            [0.015, 0.001, 0.001]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Paradigm 1 — boundary tracing ────────────────────────────────────────────
  # Meningioma: medium, convex, well-defined. T_max=300 matches expected perimeter.
  # Tighter closure_tolerance — boundary is clean and return path is predictable.
  DQN:
    agent_type:             DQN
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       300      # ~1.5× expected max perimeter (~200px)
    closure_tolerance:      3        # tight — convex, well-defined return path
    min_perimeter_steps:    30
    seed_method:            centroid
    coverage_tolerance:      1.5
    reward_step_cost:        -0.01
    reward_coverage_bonus:    0.20
    reward_off_boundary:     -0.05
    reward_off_boundary_cap:  5.0
    reward_terminal_dice:    10.0
    reward_closure_min_dice:  0.20
    reward_closure_bonus:     2.0
    reward_offimage:        -10.0
    reward_smoothness_penalty: -0.02   # stronger smoothness — meningioma IS smooth
    lr:                     1.0e-4
    gamma:                  0.97
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            40000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    25000
    train_steps:            50000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  DuelingDDQN:
    agent_type:             DUELING
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       300
    closure_tolerance:      3
    min_perimeter_steps:    30
    seed_method:            centroid
    coverage_tolerance:      1.5
    reward_step_cost:        -0.01
    reward_coverage_bonus:    0.20
    reward_off_boundary:     -0.05
    reward_off_boundary_cap:  5.0
    reward_terminal_dice:    10.0
    reward_closure_min_dice:  0.20
    reward_closure_bonus:     2.0
    reward_offimage:        -10.0
    reward_smoothness_penalty: -0.02
    lr:                     1.0e-4
    gamma:                  0.97
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            40000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    25000
    train_steps:            50000
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working
