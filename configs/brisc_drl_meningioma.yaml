# BRISC DRL — Meningioma (class filter: tumor_type == 'meningioma')
#
# Meningioma characteristics:
#   - Well-defined, often spherical or lobulated
#   - Strong contrast enhancement — clear boundary in T1+Gd MRI
#   - Medium size: diameter ~40-80px at 256×256 → perimeter ~125-250px
#   - Roughly convex — easiest case for boundary tracing
#   - Located at brain periphery (adjacent to dura)
#
# Load with:
#   cfg_full = load_drl_class_config('configs/brisc_drl_meningioma.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        1
class_name:          meningioma
tumor_type_filter:   meningioma
dataset:             BRISC
baseline_cfg_name:   brisc_lite.yaml   # RL refines the LITE baseline (attn net = competitor)
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_lite_unet_best.pt

reward_mode:   iou_delta
reward_alpha:  1.0
reward_beta:   0.0
hd_norm:       20.0
reward_potential_scale: 15.0      # PBRS Φ scale (dice_pbrs only); baseline-centred

image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          15.0
reward_clip:       1.0
min_area_fraction: 0.005
stop_eps_dice:     0.001
stop_eps_hd:       0.5
stop_n:            3

hard_mining_scale: 3.0

agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.15
    cont_trans_scale:    0.01
    ou_sigma:            [0.015, 0.001, 0.001]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Local mask refinement (SegmentationEnv v4, 24 actions) ───────────────────
  # Meningioma: medium, convex, well-defined boundary — easiest BRISC class.
  # STOP-incentive shaping (see camus_drl_c1.yaml for full rationale): breaks
  # the baseline-indifference trap so "reach best mask, then STOP" is optimal.
  # Replaces the retired Paradigm-1 boundary-tracing config (env_class:
  # contour_tracing no longer exists — see archive/paradigm1_boundary_tracing/).
  # ── TD3 (robust DDPG) on contour env — CURATED FOR meningioma (rounder) ─────
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_pbrs
    reward_potential_scale: 15.0
    reward_step_penalty:  0.0
    disable_auto_stop:    false
    n_points:            20
    cont_sectors:        12
    disp_px:             1.5
    spline_smooth:       1.5
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.25
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps:           10
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DQN:
    agent_type:          DQN
    reward_step_penalty: 0.002
    disable_auto_stop:   true
    terminal_bonus_scale: 3.0
    lr:                  1.0e-4
    gamma:               0.97
    tau:                 0.005
    embed_dim:           128
    batch_size:          64
    buffer_size:         40000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          5000
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN_GLOBAL:
    agent_type:          DUELING
    reward_step_penalty: 0.002
    disable_auto_stop:   true
    terminal_bonus_scale: 3.0
    lr:                  1.0e-4
    gamma:               0.97
    tau:                 0.005
    embed_dim:           128
    batch_size:          64
    buffer_size:         40000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          5000
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── DuelingDDQN (discrete contour refinement) — ACTIVE discrete agent ─────────
  # Dueling Double DQN on ContourRefineEnv (meningioma — rounder): 18 discrete actions =
  # push each of 8 angular boundary sectors OUT/IN + smooth + stop. Baseline-centred
  # PBRS reward. This is the discrete counterpart to TD3 (continuous contour).
  DuelingDDQN:
    agent_type:          DUELING
    env_class:           contour
    n_points:            20
    disp_px:             1.5
    spline_smooth:       1.5
    smooth_lambda:       0.5
    reward_mode:          dice_pbrs
    reward_potential_scale: 15.0
    reward_step_penalty:  0.0
    disable_auto_stop:    true
    terminal_bonus_scale: 0.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 30000
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
