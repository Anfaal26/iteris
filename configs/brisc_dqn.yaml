# BRISC DRL — Double DQN agent for brain-tumour MRI refinement.
# Tuned for small targets (~1.7% mean area): finer step size, IoU-based reward
# (less sensitive to area than Dice when target is small).

agent_type: DDQN
dataset: BRISC
target_class: 1                # 1 = tumor (only foreground class for BRISC)

baseline_cfg_name:    brisc.yaml
baseline_checkpoint:  /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Environment ────────────────────────────────────────────────────────────
image_size: 256
max_steps: 20
shift_px: 1                    # finer than CAMUS (2 px) — small tumours need precision
sdt_clip: 15.0                 # tighter than CAMUS's 20 — small SDT range
reward_clip: 1.0
min_area_fraction: 0.005       # don't drop tumours just because they're small

# ── Reward shaping (BRISC-specific) ─────────────────────────────────────────
# IoU-delta is less sensitive to area than Dice; Dice fluctuates wildly when
# a 1% target loses/gains a few pixels. IoU = Dice/(2-Dice) — smoother signal.
reward_mode: iou_delta

# ── Networks ───────────────────────────────────────────────────────────────
embed_dim: 256

# ── DQN hyperparams ────────────────────────────────────────────────────────
lr: 1.0e-4
gamma: 0.99
tau: 0.005
batch_size: 64
buffer_size: 10000
prefill_steps: 2000

epsilon_start: 1.0
epsilon_end:   0.05
epsilon_decay_steps: 40000

# ── Training ───────────────────────────────────────────────────────────────
train_steps: 50000
eval_every: 2000
seed: 42
checkpoint_dir: /kaggle/working
