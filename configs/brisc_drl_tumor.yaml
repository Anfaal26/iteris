# BRISC DRL — Brain Tumour MRI (class 1: tumor)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/brisc_drl_tumor.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# ── Algorithms ───────────────────────────────────────────────────────────────
#
# Discrete (boundary tracing — the active paradigm):
#   DQN          — 8 directional actions, 64×64 patch state, ContourTracingEnv.
#                  Agent walks the GT boundary step-by-step; the trajectory IS
#                  the segmentation.
#   DuelingDDQN  — same env, V(s) + A(s,a) heads.
#
# Continuous (kept as the paper's continuous baseline only):
#   DDPG         — 3-D continuous action (morph, dy, dx) on base SegmentationEnv
#                  (mask morphology). This is the only remaining mask-morph path
#                  in the codebase; discrete refinement was retired in favour of
#                  boundary tracing.

target_class:        1
class_name:          tumor
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Reward shaping — tumor rationale ─────────────────────────────────────────
# Week-1 baseline: Dice 0.835, HD95 ~8.4 px.  Tumours occupy ~1.7% of image
# area on average — Dice fluctuates wildly on small structures (adding/losing
# a handful of pixels swings Dice by ~0.01).  IoU-delta is smoother for small
# targets because IoU = Dice/(2−Dice) compresses the scale, reducing variance
# in the reward signal.  hd_norm kept for potential composite ablation.
reward_mode:   iou_delta          # smoother than dice_delta for small targets
reward_alpha:  1.0                # not used for iou_delta; kept for composite ablation
reward_beta:   0.0                # not used for iou_delta
hd_norm:       17.0               # 2× mean HD95 (~8.36 px) — for ablation only

# ── Environment (DDPG continuous baseline) ──────────────────────────────────
# These are only consumed by the DDPG SegmentationEnv path. The discrete
# boundary-tracing agents have their own env params in their own blocks.
image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          15.0           # tighter than CAMUS (20) — small structures
reward_clip:       1.0
min_area_fraction: 0.005          # keep small tumours; ~12×12 px in 256×256
stop_eps_dice:     0.001
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining (DDPG only) ──────────────────────────────────────────
hard_mining_scale: 3.0

# ── Per-agent hyperparams ────────────────────────────────────────────────────
agents:

  # ──────────────────────────────────────────────────────────────────────────
  # DDPG — continuous baseline (mask morphology, SegmentationEnv)
  # ──────────────────────────────────────────────────────────────────────────
  DDPG:
    agent_type:          DDPG
    # env_class implicitly 'default' (continuous always uses base env)
    cont_morph_scale:    0.15        # ±2.25 px dilation/erosion  (at sdt_clip=15)
    cont_trans_scale:    0.01        # ±2.56 px translation        (at H=256)
    ou_sigma:            [0.015, 0.001, 0.001]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ──────────────────────────────────────────────────────────────────────────
  # Paradigm 1 — sequential boundary tracing (the agent draws the mask)
  # ──────────────────────────────────────────────────────────────────────────
  # Tumours are blobs, not contours, but every blob has a boundary the agent can
  # trace.  Largest-CC only (multi-focal tumours are a documented v1 limitation).
  # Shorter perimeter (~100 px for a 30-px tumour) → smaller max_trace_length,
  # looser closure_tolerance (irregular shapes), smaller min_perimeter_steps.
  DQN:
    agent_type:             DQN
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       300      # 200→300: covers glioma upper-tail perimeters
                                     # (mean tumour area 1.95% → perimeter ~127px;
                                     #  large gliomas can exceed 250px; 300 = safe margin)
    closure_tolerance:      4        # looser: irregular tumour boundaries
    min_perimeter_steps:    20

    # ── Precision-tuned reward (fix for smoothed-peak / engulfed-segment issue) ──
    # Per-step:
    reward_smoothness_penalty:  0.0     # OFF for BRISC — irregular tumor shapes need
                                        # sharp turns to trace protrusions/concavities.
                                        # Keeping this non-zero forces smooth arcs that
                                        # miss fine boundary features.
    coverage_tolerance:       1.0       # tighter (was 1.5px): agent must be ON the
                                        # boundary to earn the coverage bonus, not nearby.
    reward_step_cost:         -0.01     # mild time pressure
    reward_coverage_bonus:     0.25     # raised (was 0.20): compensate for tighter tolerance
    reward_off_boundary:      -0.05     # soft gradient toward boundary
    reward_off_boundary_cap:   5.0
    # Terminal:
    reward_terminal_dice:     10.0      # area overlap — main objective
    reward_boundary_precision:  3.0     # ★ NEW: fraction of GT boundary pixels visited
                                        # during the trace. Rewards shape adherence, not
                                        # just area. Penalises skipping protrusions.
    reward_closure_min_dice:   0.20     # anti-empty-loop gate
    reward_closure_bonus:      2.0      # +2·Dice on proper closure
    reward_offimage:          -10.0     # hard off-image penalty
    lr:                     1.0e-4
    gamma:                  0.97
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            40000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    25000   # 15k→25k: exploration covers full budget
    train_steps:            50000   # 25k→50k: curve hadn't plateaued at 25k
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working

  DuelingDDQN:
    agent_type:             DUELING
    env_class:              contour_tracing
    patch_size:             64
    max_trace_length:       300      # 200→300: covers glioma upper-tail perimeters
                                     # (mean tumour area 1.95% → perimeter ~127px;
                                     #  large gliomas can exceed 250px; 300 = safe margin)
    closure_tolerance:      4
    min_perimeter_steps:    20

    # ── Precision-tuned reward (fix for smoothed-peak / engulfed-segment issue) ──
    # Per-step:
    reward_smoothness_penalty:  0.0     # OFF for BRISC — irregular tumor shapes need
                                        # sharp turns to trace protrusions/concavities.
                                        # Keeping this non-zero forces smooth arcs that
                                        # miss fine boundary features.
    coverage_tolerance:       1.0       # tighter (was 1.5px): agent must be ON the
                                        # boundary to earn the coverage bonus, not nearby.
    reward_step_cost:         -0.01     # mild time pressure
    reward_coverage_bonus:     0.25     # raised (was 0.20): compensate for tighter tolerance
    reward_off_boundary:      -0.05     # soft gradient toward boundary
    reward_off_boundary_cap:   5.0
    # Terminal:
    reward_terminal_dice:     10.0      # area overlap — main objective
    reward_boundary_precision:  3.0     # ★ NEW: fraction of GT boundary pixels visited
                                        # during the trace. Rewards shape adherence, not
                                        # just area. Penalises skipping protrusions.
    reward_closure_min_dice:   0.20     # anti-empty-loop gate
    reward_closure_bonus:      2.0      # +2·Dice on proper closure
    reward_offimage:          -10.0     # hard off-image penalty
    lr:                     1.0e-4
    gamma:                  0.97
    tau:                    0.005
    embed_dim:              128
    batch_size:             64
    buffer_size:            40000
    prefill_steps:          2000
    epsilon_start:          1.0
    epsilon_end:            0.05
    epsilon_decay_steps:    25000   # 15k→25k: exploration covers full budget
    train_steps:            50000   # 25k→50k: curve hadn't plateaued at 25k
    num_envs:               16
    grad_updates:           1
    eval_every:             5000
    val_subset:             50
    seed:                   42
    checkpoint_dir:         /kaggle/working
