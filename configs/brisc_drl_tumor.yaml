# BRISC DRL — Brain Tumour MRI (class 1: tumor)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/brisc_drl_tumor.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# ── Algorithms ───────────────────────────────────────────────────────────────
#
# DQN / DuelingDDQN — 14-action local mask refinement (SegmentationEnv v4):
#   4 directional dilations + 4 directional erosions + 4 shifts + smooth + stop.
#   Reward: iou_delta (smoother for small tumours).
#
# DDPG — 3-D continuous action (morph, dy, dx) on the same SegmentationEnv.
#   Kept as the paper's continuous comparison baseline.

target_class:        1
class_name:          tumor
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Reward shaping — tumor rationale ─────────────────────────────────────────
# Week-1 baseline: Dice 0.835, HD95 ~8.4 px.  Tumours occupy ~1.7% of image
# area on average — Dice fluctuates wildly on small structures (adding/losing
# a handful of pixels swings Dice by ~0.01).  IoU-delta is smoother for small
# targets because IoU = Dice/(2−Dice) compresses the scale, reducing variance
# in the reward signal.  hd_norm kept for potential composite ablation.
reward_mode:   iou_delta          # smoother than dice_delta for small targets
reward_alpha:  1.0                # not used for iou_delta; kept for composite ablation
reward_beta:   0.0                # not used for iou_delta
hd_norm:       17.0               # 2× mean HD95 (~8.36 px) — for ablation only

# ── Environment (shared by all agents — SegmentationEnv v4) ─────────────────
image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          15.0           # tighter than CAMUS (20) — small structures
reward_clip:       1.0
min_area_fraction: 0.005          # keep small tumours; ~12×12 px in 256×256
stop_eps_dice:     0.001
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining (DDPG only) ──────────────────────────────────────────
hard_mining_scale: 3.0

# ── Per-agent hyperparams ────────────────────────────────────────────────────
agents:

  DDPG:
    agent_type:          DDPG
    # env_class implicitly 'default' (continuous always uses base env)
    cont_morph_scale:    0.15        # ±2.25 px dilation/erosion  (at sdt_clip=15)
    cont_trans_scale:    0.01        # ±2.56 px translation        (at H=256)
    ou_sigma:            [0.015, 0.001, 0.001]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DQN:
    agent_type:          DQN
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         30000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 15000
    train_steps:         30000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN:
    agent_type:          DUELING
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         30000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 15000
    train_steps:         30000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
