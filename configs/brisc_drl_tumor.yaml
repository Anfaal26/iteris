# BRISC DRL — Brain Tumour MRI (class 1: tumor)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/brisc_drl_tumor.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# The ``agents:`` block contains per-algorithm hyperparams.
# All env/reward keys at the top level are shared across agents.

target_class:        1
class_name:          tumor
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Reward shaping — tumor rationale ─────────────────────────────────────────
# Week-1 baseline: Dice 0.835, HD95 ~8.4 px.  Tumours occupy ~1.7% of image
# area on average — Dice fluctuates wildly on small structures (adding/losing a
# handful of pixels swings Dice by ~0.01).  IoU-delta is smoother for small
# targets because IoU = Dice/(2−Dice) compresses the scale, reducing variance
# in the reward signal.  hd_norm kept for potential composite ablation.
reward_mode:   iou_delta          # smoother than dice_delta for small targets
reward_alpha:  1.0                # not used for iou_delta; kept for composite ablation
reward_beta:   0.0                # not used for iou_delta
hd_norm:       17.0               # 2× mean HD95 (~8.36 px) — for ablation only

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          1              # 1 px — finer than CAMUS (2 px), small tumours need precision
sdt_clip:          15.0           # tighter than CAMUS (20) — small tumours have shorter SDT gradients
reward_clip:       1.0
min_area_fraction: 0.005          # keep small tumours; ~12×12 px in 256×256
stop_eps_dice:     0.001          # at Dice 0.835 a 0.001 step gain is real signal
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# BRISC mean init Dice ~0.835 — more natural spread than CAMUS, but still
# beneficial to upweight the hard tail (dice<0.75, often partial-view tumours).
# Lower scale than CAMUS (3 vs 5) because the distribution is already harder.
hard_mining_scale: 3.0
action_penalty:    0.001            # smaller than CAMUS: IoU-delta rewards are smaller
                                    # in magnitude for small tumours; same oscillation fix

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
agents:

  DQN:
    agent_type:          DQN
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000    # large buffer retains diverse exploration signal
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000    # reach low-ε while buffer still has diverse content
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DDQN:
    agent_type:          DDQN
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DUELING:
    agent_type:          DUELING
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DDPG:
    agent_type:          DDPG
    # Smaller scales than CAMUS: small tumours (~1.7% area) need finer control
    cont_morph_scale:    0.15        # ±2.25 px dilation/erosion  (at sdt_clip=15)
    cont_trans_scale:    0.01        # ±2.56 px translation        (at H=256)
    # Per-component OU noise — proportional to each scale
    ou_sigma:            [0.015, 0.001, 0.001]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  MSA-DUELING:
    agent_type:          MSA-DUELING
    num_heads:           4
    key_dim:             64
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  MSA-DDPG:
    agent_type:          MSA-DDPG
    num_heads:           4
    key_dim:             64
    cont_morph_scale:    0.15
    cont_trans_scale:    0.01
    ou_sigma:            [0.015, 0.001, 0.001]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
