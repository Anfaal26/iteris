# BRISC DRL — Brain Tumour MRI (class 1: tumor)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/brisc_drl_tumor.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# ── Algorithms ───────────────────────────────────────────────────────────────
#
# DQN / DuelingDDQN — 24-action local mask refinement (SegmentationEnv v4):
#   4 cardinal dilations + 4 cardinal erosions
#   4 diagonal dilations + 4 diagonal erosions (NEW — precise corner correction)
#   4 shifts + smooth + add_uncertain + remove_uncertain (NEW) + stop
#   Reward: iou_delta (smoother for small tumours).
#
# DDPG — 3-D continuous action (morph, dy, dx) on the same SegmentationEnv.
#   Kept as the paper's continuous comparison baseline.

target_class:        1
class_name:          tumor
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Reward shaping — tumor rationale ─────────────────────────────────────────
# Week-1 baseline: Dice 0.835, HD95 ~8.4 px.  Tumours occupy ~1.7% of image
# area on average — Dice fluctuates wildly on small structures (adding/losing
# a handful of pixels swings Dice by ~0.01).  IoU-delta is smoother for small
# targets because IoU = Dice/(2−Dice) compresses the scale, reducing variance
# in the reward signal.  hd_norm kept for potential composite ablation.
reward_mode:   iou_delta          # smoother than dice_delta for small targets
reward_alpha:  1.0                # not used for iou_delta; kept for composite ablation
reward_beta:   0.0                # not used for iou_delta
hd_norm:       17.0               # 2× mean HD95 (~8.36 px) — for ablation only

# ── Environment (shared by all agents — SegmentationEnv v4) ─────────────────
image_size:        256
max_steps:         20
shift_px:          1
sdt_clip:          15.0           # tighter than CAMUS (20) — small structures
reward_clip:       1.0
min_area_fraction: 0.005          # keep small tumours; ~12×12 px in 256×256
stop_eps_dice:     0.005    # 0.001→0.005: at BRISC init Dice ~0.876, a 1-px op
                            # changes Dice by 0.001–0.003, causing false-convergence
                            # after 3 steps. 0.005 ensures the agent genuinely stops
                            # only when nothing meaningful is changing.
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ───────────────────────────────────────────────────────
# Applies to ALL agents (not DDPG-only). At init Dice ~0.876, 80%+ of samples
# are already near-perfect — morphological ops can't improve them. Hard mining
# focuses training on the improvable minority.
# scale=8.0: Dice=0.80 gets ~7× weight vs Dice=0.93 (~1.7×). Aggressive but
# necessary — without it the agent sees mostly zero-improvement gradient.
hard_mining_scale: 8.0

# ── Per-agent hyperparams ────────────────────────────────────────────────────
agents:

  DDPG:
    agent_type:          DDPG
    # env_class implicitly 'default' (continuous always uses base env)
    cont_morph_scale:    0.15        # ±2.25 px dilation/erosion  (at sdt_clip=15)
    cont_trans_scale:    0.01        # ±2.56 px translation        (at H=256)
    ou_sigma:            [0.015, 0.001, 0.001]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DQN:
    agent_type:          DQN
    # ── STOP-incentive shaping (breaks baseline-indifference trap) ──
    reward_step_penalty: 0.002   # cost per non-STOP step → STOP-at-baseline becomes optimal
    disable_auto_stop:   true    # agent's STOP action decides termination, not a heuristic
    # Path-independent terminal bonus — see camus_drl_c1.yaml for full rationale.
    # `scale * (Dice_final - Dice_0)` is added ONLY to the reward of whichever
    # transition ends the episode, making "reach the best mask and STOP there"
    # dominate "wander and hope" — directly targets the best-seen ≫ final gap
    # visible in the BRISC log (init 0.876 → final 0.73-0.77 | best-seen 0.88).
    # 3.0: BRISC has more headroom (gains up to ~0.04) so a smaller multiplier
    # than CAMUS already produces a comparably-sized terminal signal.
    terminal_bonus_scale: 3.0

    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000           # larger: 24 actions need more diverse experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000           # slower decay: more exploration over 24-action space
    train_steps:         50000           # 30k→50k: training curve was still rising
    eval_every:          2000
    hard_mining_scale:   8.0             # override top-level: must be set per-agent to take effect
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN:
    agent_type:          DUELING
    # ── STOP-incentive shaping (breaks baseline-indifference trap) ──
    reward_step_penalty: 0.002   # cost per non-STOP step → STOP-at-baseline becomes optimal
    disable_auto_stop:   true    # agent's STOP action decides termination, not a heuristic
    # Path-independent terminal bonus — see camus_drl_c1.yaml for full rationale.
    # `scale * (Dice_final - Dice_0)` is added ONLY to the reward of whichever
    # transition ends the episode, making "reach the best mask and STOP there"
    # dominate "wander and hope" — directly targets the best-seen ≫ final gap
    # visible in the BRISC log (init 0.876 → final 0.73-0.77 | best-seen 0.88).
    # 3.0: BRISC has more headroom (gains up to ~0.04) so a smaller multiplier
    # than CAMUS already produces a comparably-sized terminal signal.
    terminal_bonus_scale: 3.0

    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    hard_mining_scale:   8.0
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Control-point CONTOUR refinement (Paradigm 3) ────────────────────────────
  # Local boundary deformation (control points + periodic spline) — see
  # camus_drl_c1.yaml::DuelingDDQN_CONTOUR for the full rationale. Selected by
  # `env_class: contour`. Tumours are smaller and can be irregular (glioma), so
  # fewer points, tighter displacement, and lighter spline smoothing than CAMUS.
  #   cfg = resolve_agent_config(load_drl_class_config('configs/brisc_drl_tumor.yaml'),
  #                              'DuelingDDQN_CONTOUR')
  DuelingDDQN_CONTOUR:
    agent_type:          DUELING
    env_class:           contour
    # ── contour geometry ──
    n_points:            24            # smaller structures → fewer control points
    disp_px:             1.0           # tighter than CAMUS (1.5) — small targets
    spline_smooth:       1.0           # lighter smoothing — preserve irregular margins
    smooth_lambda:       0.5
    # ── reward shaping ──
    reward_step_penalty: 0.002
    disable_auto_stop:   true
    terminal_bonus_scale: 3.0
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 30000
    train_steps:         60000
    eval_every:          2000
    hard_mining_scale:   8.0
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
