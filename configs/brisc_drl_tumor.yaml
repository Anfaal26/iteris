# BRISC DRL — Brain Tumour MRI (class 1: tumor)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/brisc_drl_tumor.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# ── Two action-space designs for two algorithm families ──────────────────────
#
# DQN family (DQN / DDQN / DUELING / MSA-DUELING) — uses SegmentationEnvBRISC
#   • 9-action discrete (4 dir-dilate + 4 dir-erode + no-op, NO shifts)
#   • max_steps=5, stop_n=2, stop_eps_dice=0.005, fail-fast at -0.05 Dice
#   • hard_mining_scale=0 (off — caused generalisation failure on small targets)
#   • Reason: 30-px tumours need short episodes and a tight action set;
#     whole-mask shifts almost always hurt when the U-Net already located the
#     tumour correctly.
#
# DDPG family (DDPG / MSA-DDPG) — uses base SegmentationEnv
#   • 3-D continuous (morph, dy, dx) — Sprint-2 contour DDPG will replace this
#   • max_steps=20, hard_mining_scale=3.0 (kept for continuous baseline)

target_class:        1
class_name:          tumor
dataset:             BRISC
baseline_cfg_name:   brisc.yaml
baseline_checkpoint: /kaggle/input/brisc-baseline-outputs/brisc_best.pt

# ── Reward shaping — tumor rationale ─────────────────────────────────────────
# Week-1 baseline: Dice 0.835, HD95 ~8.4 px.  Tumours occupy ~1.7% of image
# area on average — Dice fluctuates wildly on small structures (adding/losing
# a handful of pixels swings Dice by ~0.01).  IoU-delta is smoother for small
# targets because IoU = Dice/(2−Dice) compresses the scale, reducing variance
# in the reward signal.  hd_norm kept for potential composite ablation.
reward_mode:   iou_delta          # smoother than dice_delta for small targets
reward_alpha:  1.0                # not used for iou_delta; kept for composite ablation
reward_beta:   0.0                # not used for iou_delta
hd_norm:       17.0               # 2× mean HD95 (~8.36 px) — for ablation only

# ── Environment (DDPG family defaults; DQN family overrides per-agent) ──────
image_size:        256
max_steps:         20             # DDPG default — DQN agents override to 5
shift_px:          1              # only relevant if shifts are in the action set
sdt_clip:          15.0           # tighter than CAMUS (20) — small structures
reward_clip:       1.0
min_area_fraction: 0.005          # keep small tumours; ~12×12 px in 256×256
stop_eps_dice:     0.001          # DDPG default — DQN agents override to 0.005
stop_eps_hd:       0.5
stop_n:            3              # DDPG default — DQN agents override to 2

# ── Hard sample mining (DDPG family) ────────────────────────────────────────
# Continuous DDPG with sub-pixel morph can benefit from hard mining since each
# action is finer-grained and "be active" overfitting is less catastrophic.
# DQN family OVERRIDES hard_mining_scale to 0 — see per-agent blocks.
hard_mining_scale: 3.0

# ── Per-agent hyperparams ────────────────────────────────────────────────────
agents:

  # ──────────────────────────────────────────────────────────────────────────
  # DQN family — uses SegmentationEnvBRISC (9-action small-target env)
  # ──────────────────────────────────────────────────────────────────────────

  DQN:
    agent_type:          DQN
    # ── BRISC small-target env ──
    env_class:           brisc_small_target   # 9 actions, no shifts
    max_steps:           5                    # was 20: caps compounding damage
    stop_n:              2                    # was 3: bail eagerly on convergence
    stop_eps_dice:       0.005                # was 0.001: looser threshold for iou_delta
    fail_thresh:         0.05                 # terminate if Dice drops 5pp below init
    fail_n:              2                    # ...for 2 consecutive steps
    hard_mining_scale:   0.0                  # off: caused "always-active" overfit
    # ── Agent hyperparams — tuned for short episodes ──
    lr:                  1.0e-4
    gamma:               0.95                 # was 0.99: shorter episodes → less bootstrapping
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         30000                # was 50000: smaller because episodes are short
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 12000                # was 25000: faster decay for short episodes
    train_steps:         30000                # was 50000: BRISC converges faster on the smaller env
    eval_every:          1500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DDQN:
    agent_type:          DDQN
    env_class:           brisc_small_target
    max_steps:           5
    stop_n:              2
    stop_eps_dice:       0.005
    fail_thresh:         0.05
    fail_n:              2
    hard_mining_scale:   0.0
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         30000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 12000
    train_steps:         30000
    eval_every:          1500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DUELING:
    agent_type:          DUELING
    env_class:           brisc_small_target
    max_steps:           5
    stop_n:              2
    stop_eps_dice:       0.005
    fail_thresh:         0.05
    fail_n:              2
    hard_mining_scale:   0.0
    # Dueling should win here: V(s) head captures "this state is bad regardless
    # of action" cleanly, A head handles the small action-specific differences.
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         30000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 12000
    train_steps:         30000
    eval_every:          1500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  MSA-DUELING:
    agent_type:          MSA-DUELING
    env_class:           brisc_small_target
    max_steps:           5
    stop_n:              2
    stop_eps_dice:       0.005
    fail_thresh:         0.05
    fail_n:              2
    hard_mining_scale:   0.0
    num_heads:           4
    key_dim:             64
    lr:                  1.0e-4
    gamma:               0.95
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         30000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 12000
    train_steps:         30000
    eval_every:          1500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ──────────────────────────────────────────────────────────────────────────
  # DDPG family — uses base SegmentationEnv (continuous baseline pending
  # Sprint-2 contour DDPG)
  # ──────────────────────────────────────────────────────────────────────────

  DDPG:
    agent_type:          DDPG
    # env_class implicitly 'default' (continuous always uses base env)
    cont_morph_scale:    0.15        # ±2.25 px dilation/erosion  (at sdt_clip=15)
    cont_trans_scale:    0.01        # ±2.56 px translation        (at H=256)
    ou_sigma:            [0.015, 0.001, 0.001]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  MSA-DDPG:
    agent_type:          MSA-DDPG
    num_heads:           4
    key_dim:             64
    cont_morph_scale:    0.15
    cont_trans_scale:    0.01
    ou_sigma:            [0.015, 0.001, 0.001]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
