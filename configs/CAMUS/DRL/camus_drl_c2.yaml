# CAMUS DRL — Class 2: LV_epi (left ventricular epicardium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c2.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)

target_class:        2
class_name:          LV_epi
dataset:             CAMUS
baseline_cfg_name:   CAMUS/camus_lite.yaml   # RL refines the LITE baseline (attn net = competitor)
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_lite_unet_best.pt

# ── Reward shaping — LV_epi rationale ────────────────────────────────────────
# Week-1 baseline: Dice 0.872, HD95 ~8 px.  LV_epi wraps LV_endo and tapers
# to a thin apex — the single hardest boundary in CAMUS.  Pure Dice-delta
# treats all boundary pixels equally; the HD95 component specifically penalises
# large deviations that occur at the apex, which account for most HD95 error.
# Balanced alpha/beta (0.5/0.5): both overlap and precision matter equally here.
# hd_norm = 2× expected HD95 of ~8 px.
reward_mode:   dice_hd_composite
reward_alpha:  0.5               # 50 % Dice
reward_beta:   0.5               # 50 % HD95 — apex boundary is high-priority
hd_norm:       16.0              # normalise HD95; 16 ≈ 2× expected HD95 of ~8 px
reward_potential_scale: 10.0     # PBRS Φ scale (dice_pbrs/dice_hd_pbrs only); baseline-centred

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.005      # 1-px op on LVepi ≈ 0.003–0.007 Dice; 0.001 = false convergence
stop_eps_hd:       0.5
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# LVepi has more shape variability than LVendo. scale=10 starved the agent of
# easy masks → degraded them at eval; scale=3 keeps the easy majority in the mix
# (see camus_drl_c1.yaml for the full train/eval-mismatch rationale).
hard_mining_scale: 3.0
# Tier 1.5 floor (see iteris/drl_training.py _hard_mining_weights): same
# rationale as camus_drl_c1.yaml -- CONFIRMED real headroom for LV_epi
# (+0.073, the largest of the 3 CAMUS classes, docs/CONTEXT.md 2026-06-25)
# and scale=3.0 already conservative (this file's own history: scale=10
# starved the easy majority and degraded it at eval, see comment above).
# Light floor as cheap insurance on top of an already-tuned scale.
hard_mining_uniform_mix: 0.9

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
# ── Ablation knobs (OFF by default — see docs/EXPERIMENTS.md + SKILLS.md) ──────
# directional_state: append 2 DeepSnake-style SDT-gradient 'direction' channels
#   to the agent state (5->7) — tells each location WHICH WAY the boundary is,
#   not just how far. Flip to true to run the ablation. WARNING: changes the
#   network input shape -> invalidates existing 5-channel DRL checkpoints (no
#   resume across the flip) and makes results incomparable to 5-channel runs;
#   treat as a separate arm and coordinate before enabling on a shared iteris-pkg.
directional_state:    false
# topology_filter: down-weight (or drop) TRAINING samples whose init mask has a
#   high (topology+interior) error fraction — structural error contour nudging
#   cannot fix. Training-time only; val/test are NEVER filtered. See drl_training.
topology_filter:      false
topology_max_frac:    0.5          # samples with topo+interior error > this are affected
topology_filter_mode: downweight   # 'downweight' (keep, scaled) or 'drop' (exclude)
topology_downweight:  0.1          # weight for over-threshold samples in downweight mode

agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25
    cont_trans_scale:    0.02
    ou_sigma:            [0.025, 0.002, 0.002]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    train_steps:         120000   # DDPG needs more steps; LV_epi is the hardest class
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── TD3 (robust DDPG) on contour env — CURATED FOR LV_epi (large, smooth) ───
  # 16 angular sectors of independent boundary deformation break the global-op
  # ceiling that caps the 3-D DDPG at baseline; TD3's twin critics + target
  # smoothing + delayed updates stabilise learning on the tiny reward signal.
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_hd_pbrs
    reward_potential_scale: 10.0
    reward_step_penalty:  0.0           # KEPT 0 for TD3 (do NOT copy DuelingDDQN's 0.05): TD3 is
                                        # continuous and has NO discrete STOP action, so every step goes
                                        # through _apply_continuous which subtracts this penalty with no
                                        # penalty-free escape. A nonzero value would uniformly shift all
                                        # rewards down and push the BC-warm-started actor toward identity
                                        # (the opposite of the goal). TD3 stopping = disable_auto_stop
                                        # (GT-converge) + fail_thresh safety net, not a step penalty.
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    true          # KEPT ON for LV_epi (TD3) — its prob_map is USABLE (Pillar4 2026-06-25: band_frac=0.0193, ~2.7× the INERT c1/c3), so the gate functions as intended (bounds worst-case per-step Dice drop, focuses learning on correctable errors) instead of zeroing the actor.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    false
    fail_thresh:         0.02          # interim Pillar-2 safety net: TD3 has no learned STOP and _check_termination's dice_converged branch commits whatever the contour converged to, even below baseline. Terminate early if Dice sits >0.02 below baseline for fail_n steps so a drifting actor can't lock in a sub-baseline final mask (the deploy number).
    fail_n:              2
    n_points:            32
    cont_sectors:        16
    disp_px:             2.0
    spline_smooth:       2.0
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.2
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps:           10
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # TD3-specific: TD3 auto-stops on GT-dice convergence (disable_auto_stop=
    # false), so unlike discrete DuelingDDQN this mainly helps HARD samples --
    # raising their cap lets the continuous actor travel further toward a distant
    # boundary before being cut off (the fail_thresh net still bounds the
    # downside, so a longer cap can't lock in a worse mask). Easy-sample
    # tightening is a backstop (auto-stop usually fires first). Train-only; eval/
    # test always use the fixed max_steps above; BC demo collection (separate
    # bc_demo_max_steps) is untouched.
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 15      # LV_epi: hardest class, most headroom -> full travel room
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    bc_warm_start:       true          # TD3+BC (Fujimoto & Gu 2021): pretrain the actor on oracle demonstrations (GT used at TRAIN time only, never at deployment) so it starts from competent behaviour instead of the near-zero identity its small-init final layer collapses to; the bc_lambda regulariser then keeps RL fine-tuning from drifting back to identity under the catastrophic-downside reward landscape.
    bc_demo_episodes:    150
    bc_demo_max_steps:   8
    bc_pretrain_epochs:  30
    bc_lambda_start:     0.5
    bc_lambda_end:       0.05
    bc_lambda_decay_steps: 20000
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.

  DQN:
    agent_type:          DQN
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 30000
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN_GLOBAL:
    agent_type:          DUELING
    # ── Reward: potential-based shaping (see camus_drl_c1.yaml for rationale) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs
    disable_auto_stop:    true    # agent's STOP action decides termination
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 30000
    train_steps:         60000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── DuelingDDQN (discrete contour refinement) — ACTIVE discrete agent ─────────
  # Dueling Double DQN on ContourRefineEnv (LV_epi — large, smooth): 18 discrete actions =
  # push each of 8 angular boundary sectors OUT/IN + smooth + stop. Baseline-centred
  # PBRS reward. This is the discrete counterpart to TD3 (continuous contour).
  DuelingDDQN:
    agent_type:          DUELING
    max_steps         : 10            # cap excursion past peak (agent doesn't always STOP)
    env_class:           contour
    n_points:            32
    disp_px           : 2.0          # match TD3 + headroom diagnostic
    spline_smooth:       2.0
    smooth_lambda:       0.5
    reward_mode:          dice_hd_pbrs
    reward_potential_scale: 10.0
    reward_step_penalty:  0.05         # raised from 0.02 (2026-06-29 c3 run): 0.02 ran the full 50k steps and STOP-action rate was STILL 0% (verified in the post-run diagnostic) -- the buffer was likely starved of near-peak terminal transitions (hard_mining biases training away from states that ever reach convergence within the episode), not under-penalised. 0.05 is the same lever with a stronger push; paired with curriculum_max_steps below, which attacks the starvation directly by forcing short episodes on easy/near-peak samples.
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    true          # gate edit magnitude by U-Net confidence (prob_map) — bounds worst-case per-step Dice drop, focuses learning on the U-Net's genuinely correctable errors
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    true
    terminal_bonus_scale: 0.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 18000         # reduced from 30000 — with the uncertainty gate bounding
                                       # downside risk, push more of the training budget into
                                       # exploitation so STOP/minimal-edit-when-already-good is
                                       # reliably learned
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # GT-based difficulty (init Dice) sets a PER-SAMPLE episode length during
    # training only -- eval/test always use the fixed max_steps above (10),
    # since GT-based difficulty isn't available at deployment. Easy/near-peak
    # samples get a SHORT episode (fewer chances to drift past the peak before
    # being cut off, and many more near-converged terminal transitions land in
    # the buffer); hard samples get a LONGER episode (more room to travel).
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 15
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.
