# CAMUS DRL — Class 1: LV_endo (left ventricular endocardium)
#
# Load with:
#   from iteris.config import load_drl_class_config, resolve_agent_config
#   cfg_full = load_drl_class_config('configs/camus_drl_c1.yaml')
#   cfg      = resolve_agent_config(cfg_full, AGENT_NAME)
#   results  = run_drl_training(cfg, train_samples, val_samples)
#
# The ``agents:`` block contains per-algorithm hyperparams.
# All env/reward keys at the top level are shared across agents.

target_class:        1
class_name:          LV_endo
dataset:             CAMUS
baseline_cfg_name:   CAMUS/camus_lite.yaml   # RL refines the LITE baseline (attn net = competitor)
baseline_checkpoint: /kaggle/input/camus-baseline-outputs/camus_lite_unet_best.pt

# ── Reward shaping — LV_endo rationale ───────────────────────────────────────
# Week-1 baseline: Dice 0.938, HD95 ~6 px.  Pure Dice-delta gives almost no
# gradient signal at this level (step gain ≈ 0.003–0.005).  The HD95 component
# adds boundary-precision signal that remains informative even at high Dice.
# hd_norm = 2× mean HD95 so a typical improvement (6→4 px) contributes ~0.17
# to the composite reward — meaningful without dominating.
reward_mode:   dice_hd_composite
reward_alpha:  0.6               # 60 % Dice — still the primary target metric
reward_beta:   0.4               # 40 % HD95 — boundary precision
hd_norm:       12.0              # normalise HD95; 12 ≈ 2× mean HD95 of ~6 px
# PBRS potential scale (used only by dice_pbrs / dice_hd_pbrs agents). The
# baseline-centred potential Φ=K·(ΔDice…) needs K≫1 to lift the tiny per-step
# Dice deltas (±0.003–0.01 at this ~0.94 baseline) above the Q-net noise floor.
reward_potential_scale: 10.0

# ── Environment ───────────────────────────────────────────────────────────────
image_size:        256
max_steps:         20
shift_px:          2
sdt_clip:          20.0
reward_clip:       1.0
min_area_fraction: 0.01
stop_eps_dice:     0.005      # 0.0005→0.005: a 1-px cardinal op on LV_endo changes
                              # Dice by ~0.003–0.007. 0.0005 caused false-convergence
                              # in 3 steps before the agent could explore.
stop_eps_hd:       0.3
stop_n:            3

# ── Hard sample mining ────────────────────────────────────────────────────────
# Mild up-weighting of the improvable tail WITHOUT starving the agent of the
# easy, already-good masks that dominate the val set. scale=10 was far too
# aggressive (dice=0.75 got ~100× the weight of dice=0.95): the agent trained
# almost exclusively on hard cases, never learned "STOP when already good", and
# at eval applied aggressive edits to good masks → final Dice BELOW baseline.
# scale=3 gives dice=0.75 ~1.8× the weight of dice=0.95 — enough focus on the
# tail while keeping the easy majority well represented so STOP-when-good is
# learned. This train/eval distribution match is essential to beating baseline.
hard_mining_scale: 3.0

# ── Per-agent hyperparams ─────────────────────────────────────────────────────
# resolve_agent_config() merges the chosen block over the top-level dict.
agents:

  DDPG:
    agent_type:          DDPG
    cont_morph_scale:    0.25        # ±5 px dilation/erosion  (at sdt_clip=20)
    cont_trans_scale:    0.02        # ±5 px translation        (at H=256)
    ou_sigma:            [0.025, 0.002, 0.002]   # [morph, dy, dx]
    ou_theta:            0.15
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    actor_freeze_steps:  2000
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    train_steps:         100000
    eval_every:          2500
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── TD3 (robust DDPG) on the contour env — CURATED FOR LV_endo ──────────────
  # WHY TD3-on-contour beats the 3-D global DDPG above: a global SDT-threshold +
  # translation action cannot fix REGIONAL over/under-segmentation — its best
  # response to a near-perfect U-Net mask is ~identity, so it is capped at
  # baseline. The contour action deforms 16 independent angular sectors of the
  # boundary, so heterogeneous errors become correctable. TD3 (twin critics +
  # target smoothing + delayed updates) removes the Q-overestimation that makes
  # plain DDPG stall on this tiny, near-optimal-baseline reward signal.
  # LV_endo is large and smooth -> dense points (32), 16 sectors, dice_hd_pbrs
  # (HD95 term keeps the boundary crisp), moderate per-step deformation.
  TD3:
    agent_type:          TD3
    env_class:           contour
    reward_mode:          dice_hd_pbrs
    reward_potential_scale: 10.0
    reward_step_penalty:  0.0
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # OFF for LV_endo (TD3) — same INERT prob_map as the DuelingDDQN block (Pillar4 2026-06-25: band_frac=0.0073, ~binary). On TD3 this is worse than wasteful: `_apply_continuous` multiplies the actor's displacement by the gate (env_contour_refine.py:498), so an INERT gate zeroes the actor's moves AND zeroes the BC oracle's trial moves (bc_demo.py inherits env_kwargs+prob_map) — the actor is BC-pretrained toward identity and then can't move at all. Re-enable (together with the DuelingDDQN block) only after the label-smoothing lite retrain is confirmed USABLE.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    false      # no STOP action in continuous mode; converge-and-hold
    fail_thresh:         0.02          # interim Pillar-2 safety net: TD3 has no learned STOP and _check_termination's dice_converged branch commits whatever the contour converged to, even below baseline. Terminate early if Dice sits >0.02 below baseline for fail_n steps so a drifting actor can't lock in a sub-baseline final mask (the deploy number).
    fail_n:              2
    # contour geometry
    n_points:            32
    cont_sectors:        16
    disp_px:             2.0
    spline_smooth:       2.0
    # TD3 hyperparams
    actor_lr:            1.0e-4
    critic_lr:           1.0e-3
    gamma:               0.99
    tau:                 0.005
    policy_delay:        2
    expl_noise:          0.2
    target_noise:        0.2
    noise_clip:          0.5
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    max_steps:           10
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    bc_warm_start:       true          # TD3+BC (Fujimoto & Gu 2021): pretrain the actor on oracle demonstrations (GT used at TRAIN time only, never at deployment) so it starts from competent behaviour instead of the near-zero identity its small-init final layer collapses to; the bc_lambda regulariser then keeps RL fine-tuning from drifting back to identity under the catastrophic-downside reward landscape.
    bc_demo_episodes:    150
    bc_demo_max_steps:   8
    bc_pretrain_epochs:  30
    bc_lambda_start:     0.5
    bc_lambda_end:       0.05
    bc_lambda_decay_steps: 20000
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.

  DQN:
    agent_type:          DQN
    # ── Reward: potential-based shaping (replaces the path-dependent
    #    Dice_t−Dice_0 + terminal_bonus hack) ──
    # r_t = γ·Φ(s_{t+1}) − Φ(s_t), Φ = α·Dice + β·(1 − HD95/hd_norm).
    # Telescopes EXACTLY to γ^T·Φ_T − Φ_0 → the discounted return IS the final
    # mask's quality gain over baseline. Dense per-action credit, provably
    # policy-invariant (Ng et al. 1999), no spike-then-fade exploit. The γ<1
    # factor makes dawdling at a good state cost (γ−1)Φ per step, so STOP (reward
    # 0) is the optimal exit once no further gain is reachable — no explicit step
    # penalty or terminal bonus needed.
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs; kept 0 for clarity
    disable_auto_stop:    true    # agent's STOP action decides termination

    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  DuelingDDQN_GLOBAL:
    agent_type:          DUELING
    # ── Reward: potential-based shaping (see DQN block above) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.0
    terminal_bonus_scale: 0.0     # ignored under pbrs; kept 0 for clarity
    disable_auto_stop:    true    # agent's STOP action decides termination

    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000     # 10000→50000: retains 5× more experience
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 25000
    train_steps:         50000
    eval_every:          2000
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working

  # ── Control-point CONTOUR refinement (Paradigm 3) ────────────────────────────
  # Local boundary deformation instead of global morphology. The mask boundary is
  # N control points on a periodic spline; the agent pushes contiguous arcs
  # (sectors) of the contour outward/inward along their normals, smooths, or stops.
  # This removes the global-op ceiling: heterogeneous boundary errors (over-seg
  # here, under-seg there) become independently correctable. Selected by
  # `env_class: contour`; same 4-channel state + discrete agent as the default env,
  # so the network/buffer/loops are unchanged. Run with:
  #   cfg = resolve_agent_config(load_drl_class_config('configs/camus_drl_c1.yaml'),
  #                              'DuelingDDQN')
  DuelingDDQN:
    agent_type:          DUELING
    max_steps         : 10            # cap excursion past peak (agent doesn't always STOP)
    env_class:           contour       # → ContourRefineEnv (control points + spline)
    # ── contour geometry ──
    n_points:            32            # LV_endo is large & smooth → denser sampling
    disp_px           : 2.0          # match TD3 + headroom diagnostic
    spline_smooth:       2.0           # periodic-spline smoothing (s in splprep)
    smooth_lambda:       0.5           # Laplacian strength for the SMOOTH action
    # ── reward shaping (same machinery as the global-op agents) ──
    reward_mode:          dice_hd_pbrs
    reward_step_penalty:  0.05         # raised from 0.02 (2026-06-29 c3 run): 0.02 ran the full 50k steps and STOP-action rate was STILL 0% (verified in the post-run diagnostic) -- the buffer was likely starved of near-peak terminal transitions (hard_mining biases training away from states that ever reach convergence within the episode), not under-penalised. 0.05 is the same lever with a stronger push; paired with curriculum_max_steps below, which attacks the starvation directly by forcing short episodes on easy/near-peak samples.
    reward_clip:         4.0           # raised from 1.0 — a normal step's raw reward exceeds 1.0 once HD/Dice terms combine; the old clip floored both "slightly bad" and "catastrophic" edits to the same -1.0, erasing the gradient between them.
    uncertainty_gate:    false         # OFF for LV_endo — lite U-Net's prob_map is INERT here (Pillar4, 2026-06-25: band_frac=0.0073, ~binary), so the gate clamps edit magnitude to ~0 at ~99% of contour points, blocking the confirmed +0.047 realistic headroom. Re-enable only after the lite net is retrained with label smoothing to produce a graded prob_map.
    gate_lo:             0.35
    gate_hi:             0.65
    gate_margin:         0.10
    disable_auto_stop:    true
    terminal_bonus_scale: 0.0
    lr:                  1.0e-4
    gamma:               0.99
    tau:                 0.005
    embed_dim:           256
    batch_size:          64
    buffer_size:         50000
    prefill_steps:       2000
    epsilon_start:       1.0
    epsilon_end:         0.05
    epsilon_decay_steps: 18000         # reduced from 30000 — with the uncertainty gate bounding
                                       # downside risk, push more of the training budget into
                                       # exploitation so STOP/minimal-edit-when-already-good is
                                       # reliably learned
    train_steps:         50000
    eval_every:           5000
    checkpoint_every:     12500        # milestone snapshot every quarter of the 50k run, distinct from best/last
    # ── Curriculum max_steps (TRAINING ONLY; see drl_training.py) ────────────
    # GT-based difficulty (init Dice) sets a PER-SAMPLE episode length during
    # training only -- eval/test always use the fixed max_steps above (10),
    # since GT-based difficulty isn't available at deployment. Easy/near-peak
    # samples get a SHORT episode (fewer chances to drift past the peak before
    # being cut off, and many more near-converged terminal transitions land in
    # the buffer); hard samples get a LONGER episode (more room to travel).
    curriculum_max_steps:  true
    curriculum_easy_dice:  0.90    # init_dice >= this -> short episode
    curriculum_easy_steps: 4
    curriculum_hard_dice:  0.80    # init_dice <  this -> long episode
    curriculum_hard_steps: 15
    cache_sdt:           true
    seed:                42
    checkpoint_dir:      /kaggle/working
    spatial_head:        false         # opt-in: per-sector local-feature actor/critic head (vs. the default globally-pooled embedding). Implemented + verified but left OFF by default -- flip to true and dry-run-compare before committing full training budget to it, since it's architecturally newer than the rest of the pipeline.
