# CAMUS DRL — DDPG (continuous-action) agent.
# 3-component action: (morph, dy_norm, dx_norm) — see env.py for semantics.
# NOTE: for CAMUS training prefer the per-class configs (camus_drl_c1/c2/c3.yaml)
# which carry class-specific reward shaping. This file is kept as a standalone
# fallback for quick single-run experiments.

agent_type: DDPG
dataset: CAMUS

baseline_cfg_name:    camus.yaml
baseline_checkpoint:  /kaggle/input/camus-baseline-outputs/camus_best.pt
camus_data_root:      /kaggle/input/datasets/anfaalhossain/camus/CAMUS

target_class: 1               # 1=LV_endo, 2=LV_epi, 3=LA
reward_mode: dice_delta        # override in per-class config for class-specific shaping

# Environment
image_size: 256
max_steps: 20
sdt_clip: 20.0
reward_clip: 1.0
min_area_fraction: 0.01
cont_morph_scale: 0.25         # ±5 px dilation/erosion via SDT threshold (at sdt_clip=20)
cont_trans_scale: 0.02         # ±5 px translation (at H=256)

# Networks
embed_dim: 256

# DDPG hyperparams
actor_lr:  1.0e-4
critic_lr: 1.0e-3              # critic higher per DDPG best practice
gamma: 0.99
tau:   0.005
batch_size: 64
buffer_size: 10000
prefill_steps: 2000

# Per-component OU noise: [morph, dy, dx] — proportional to each action_scale
ou_theta: 0.15
ou_sigma: [0.025, 0.002, 0.002]

# Actor freeze for first N steps so critic can bootstrap from random transitions
actor_freeze_steps: 2000

# Training budget — DDPG converges slower than discrete agents
train_steps: 100000
eval_every:  2500
seed: 42
checkpoint_dir: /kaggle/working
