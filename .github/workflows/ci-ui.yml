name: CI — UI

# Validates iteris_ui (the Vercel-deployed React/Vite app) on every push/PR
# that touches it. This is CI only — it does NOT deploy. Vercel's own GitHub
# integration builds and deploys this same app independently on push to main
# (see docs/CI_CD.md); this workflow exists so a broken lint/test/build shows
# up as a failing check on the commit/PR itself, before or regardless of
# Vercel's own build.

on:
  push:
    branches: [main]
    paths:
      - 'iteris_ui/**'
      - '.github/workflows/ci-ui.yml'
  pull_request:
    paths:
      - 'iteris_ui/**'
      - '.github/workflows/ci-ui.yml'

jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iteris_ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iteris_ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
