# Model registry — single source of truth for model metadata shown across the UI.
# diceCamus / diceBrisc = best Dice per dataset; null = evaluation pending.
# Update with real numbers from test_scores.csv once available.

- id: unet-baseline
  name: Attention U-Net
  family: baseline
  description: >-
    Attention Residual U-Net (Oktay et al. 2018 attention gates, ResNet-style
    encoder/decoder). Deployed baseline — serves as the reference segmentation
    against which DRL refinement is evaluated.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: true
  selectable: true

- id: lite-unet
  name: Lite U-Net
  family: baseline
  description: >-
    Compact U-Net with a reduced encoder/decoder for lower-compute environments.
    Evaluation pending — not yet deployed.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false

- id: dueling-dqn
  name: Dueling DQN
  family: discrete-drl
  description: >-
    Dueling Double DQN with value/advantage stream decomposition and an
    8-direction discrete action space for boundary refinement.
    Evaluation in progress — deployment pending results.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false

- id: td3
  name: TD3
  family: continuous-drl
  description: >-
    Twin Delayed Deep Deterministic Policy Gradient with continuous vertex-
    displacement actions and clipped double-Q targets for stable policy learning.
    Evaluation in progress — deployment pending results.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false
