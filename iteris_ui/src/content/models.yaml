# Model registry — single source of truth for model metadata shown across the UI
# (landing model preview, model library, workspace selection cards) and used by
# the mock API. Metrics mirror the research Results table (spec §5/§8).
# diceCamus / diceBrisc = best Dice per dataset; null = not evaluated there.

# NOTE: DRL agents (dqn/ddqn/dueling-dqn/ddpg) are trained-in-name only —
# checkpoints don't exist yet, so they're marked deployed:false/selectable:false
# until the backend can actually serve them. unet-baseline now points at the
# real trained Attention Res-U-Net checkpoint and is the only selectable model.
# Replace the dice*/iou/hd null placeholders with real numbers from
# camus_summary.json / camus_test_scores.csv once available.

- id: unet-baseline
  name: Attention U-Net
  family: baseline
  description: >-
    Attention Residual U-Net (Oktay et al. 2018 attention gates, ResNet-style
    encoder/decoder). The only deployed checkpoint right now — DRL refinement
    agents below are still training.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: true
  selectable: true

- id: dqn
  name: DQN
  family: discrete-drl
  description: >-
    Double Deep Q-Network with a patch-CNN backbone and an 8-direction discrete
    action space refining the contour one pixel at a time. Training in progress
    — not yet deployed.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false

- id: ddqn
  name: DDQN
  family: discrete-drl
  description: >-
    Double DQN with separate online and target networks for more stable
    Q-value estimates during contour refinement. Training in progress — not
    yet deployed.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false

- id: dueling-dqn
  name: Dueling DQN
  family: discrete-drl
  description: >-
    Dueling architecture combining a value stream and an advantage stream with
    Double DQN. Training in progress — not yet deployed.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false

- id: ddpg
  name: DDPG
  family: continuous-drl
  description: >-
    Deterministic Policy Gradient with a continuous action space (vertex
    displacement) and an actor-critic architecture. Training in progress —
    not yet deployed.
  diceCamus: null
  diceBrisc: null
  iou: null
  hd: null
  deployed: false
  selectable: false
